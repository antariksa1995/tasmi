<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Tasmi & Tahfizh Al-Quran</title>
    
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        * { -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        
        .dt-table { width: 100%; border-collapse: collapse; }
        .dt-table th, .dt-table td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }
        .dt-table th { background-color: #f9fafb; font-weight: 600; color: #374151; }
        .dt-table tr:hover { background-color: #f3f4f6; }

        .canvas-cetak {
            background-color: white;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden">

    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center hidden">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-700" id="loadingText">Memuat Aplikasi...</h2>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="appContainer" class="flex h-[100dvh] w-full hidden">
        <div id="sidebarBackdrop" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden" onclick="window.toggleSidebar()"></div>
        
        <aside id="sidebar" class="w-64 bg-emerald-800 text-white flex flex-col transition-all duration-300 transform -translate-x-full md:translate-x-0 fixed md:relative z-40 h-full">
            <div class="p-5 flex items-center justify-between border-b border-emerald-700 shrink-0">
                <div class="flex items-center gap-3">
                    <i class="fas fa-quran text-2xl text-emerald-300"></i>
                    <span id="appNameDisplay" class="font-bold text-lg tracking-wide">e-Tasmi</span>
                </div>
                <button onclick="window.toggleSidebar()" class="md:hidden text-white p-2"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4 flex flex-col gap-2 overflow-y-auto flex-1" id="menuContainer"></div>
            <div class="p-4 border-t border-emerald-700 shrink-0 pb-8 md:pb-4">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-emerald-600 flex items-center justify-center font-bold shrink-0" id="userInitial">A</div>
                    <div class="overflow-hidden">
                        <div class="text-sm font-semibold truncate w-full" id="userNameDisplay">Admin</div>
                        <div class="text-xs text-emerald-300" id="userRoleDisplay">Super Admin</div>
                    </div>
                </div>
                <button onclick="window.logout()" class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded text-sm font-medium transition flex items-center justify-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full bg-gray-50 relative overflow-hidden">
            <header class="bg-white shadow-sm h-16 flex items-center justify-between px-4 lg:px-8 z-30">
                <button onclick="window.toggleSidebar()" class="md:hidden text-gray-600 hover:text-emerald-600 text-xl"><i class="fas fa-bars"></i></button>
                <h1 class="text-xl font-semibold text-gray-800 truncate" id="pageTitle">Dashboard</h1>
                <div class="flex gap-3">
                    <button onclick="window.initApp()" id="btnRefreshGlobal" class="text-gray-500 hover:text-emerald-600 transition p-2" title="Refresh Data"><i class="fas fa-sync-alt"></i></button>
                </div>
            </header>

            <div id="contentArea" class="flex-1 overflow-y-auto p-4 lg:p-8 pb-24"></div>
        </main>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 bg-emerald-900 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-8 m-4 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
            <div class="text-center mb-8">
                <i class="fas fa-book-quran text-4xl text-emerald-600 mb-3"></i>
                <h2 class="text-2xl font-bold text-gray-800" id="loginTitleDisplay">Sistem Akademik Tahfizh</h2>
                <p class="text-sm text-gray-500 mt-1">Silakan login untuk melanjutkan</p>
            </div>
            <form id="loginForm" onsubmit="window.handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username / No. WA</label>
                    <input type="text" id="loginUsername" required class="w-full px-4 py-2 border rounded-lg focus:ring-emerald-500 focus:border-emerald-500 outline-none transition" placeholder="Masukkan Username / WA">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required class="w-full px-4 py-2 pr-10 border rounded-lg focus:ring-emerald-500 focus:border-emerald-500 outline-none transition" placeholder="Admin/Tgl Lahir (DDMMYYYY)">
                        <button type="button" onclick="window.togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-emerald-600 transition" title="Intip Password">
                            <i class="fas fa-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg transition shadow-lg shadow-emerald-200 flex justify-center items-center gap-2">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>
        </div>
    </div>

    <!-- MODAL GENERAL -->
    <div id="generalModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col">
            <div class="px-6 py-4 border-b flex justify-between items-center">
                <h3 class="font-bold text-lg" id="modalTitle">Form</h3>
                <button onclick="window.closeModal()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 overflow-y-auto" id="modalBody"></div>
            <div class="px-6 py-4 border-t bg-gray-50 flex justify-end gap-3 rounded-b-xl" id="modalFooter">
                <button onclick="window.closeModal()" class="px-4 py-2 text-gray-600 bg-gray-200 hover:bg-gray-300 rounded">Batal</button>
                <button id="btnSaveModal" class="px-4 py-2 text-white bg-emerald-600 hover:bg-emerald-700 rounded shadow">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        // ====================================================================================
        // KONFIGURASI DAN VARIABEL GLOBAL
        // ====================================================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyxZe0E3kvQuMHpTo4pVGZZFd6ahJCiiu1XW8QGps90CInv0Av1E5xzFPv0VDNfCzrO/exec"; 
        const SuraList = ["Al-Fatihah","Al-Baqarah","Ali 'Imran","An-Nisa'","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Taubah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra'","Al-Kahf","Maryam","Taha","Al-Anbiya'","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Asy-Syu'ara'","An-Naml","Al-Qasas","Al-'Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba'","Fatir","Yasin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Asy-Syura","Az-Zukhruf","Ad-Dukhan","Al-Jasiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Az-Zariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hasyr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Tagabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddassir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba'","An-Nazi'at","'Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Insyiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Gasyiyah","Al-Fajr","Al-Balad","Asy-Syams","Al-Lail","Ad-Duha","Asy-Syarh","At-Tin","Al-'Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-'Adiyat","Al-Qari'ah","At-Takasur","Al-'Asr","Al-Humazah","Al-Fil","Quraisy","Al-Ma'un","Al-Kausar","Al-Kafirun","An-Nasr","Al-Lahab","Al-Ikhlas","Al-Falaq","An-Nas"];
        
        let currentUser = null; 
        let currentRole = null; 
        let DB = {}; 
        let maps = { unit: {}, guru: {}, kelas: {}, halaqoh: {}, jabatan: {}, siswa: {} }; 
        let progressChartInstance = null;

        // ====================================================================================
        // FUNGSI UTILITAS GLOBAL
        // ====================================================================================
        window.getJuzPages = function(juz) { return (juz >= 1 && juz <= 29) ? 20 : (juz == 30 ? 23 : 0); };
        
        window.showLoading = function(text = "Memuat...") { 
            const el = document.getElementById('loadingText');
            if (el) el.innerText = text; 
            document.getElementById('loadingScreen')?.classList.remove('hidden'); 
        };
        
        window.hideLoading = function() { document.getElementById('loadingScreen')?.classList.add('hidden'); };
        
        window.toggleSidebar = function() { 
            document.getElementById('sidebar')?.classList.toggle('-translate-x-full'); 
            document.getElementById('sidebarBackdrop')?.classList.toggle('hidden'); 
        };
        
        window.closeModal = function() { document.getElementById('generalModal')?.classList.add('hidden'); };
        
        window.togglePasswordVisibility = function() {
            const pwdInput = document.getElementById('loginPassword');
            const pwdIcon = document.getElementById('togglePasswordIcon');
            if (pwdInput && pwdIcon) {
                if (pwdInput.type === 'password') {
                    pwdInput.type = 'text';
                    pwdIcon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    pwdInput.type = 'password';
                    pwdIcon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            }
        };

        window.formatDateToDDMMYYYY = function(dateString) {
            if (!dateString) return '';
            let d = String(dateString).split('T')[0];
            if (d.includes('-')) {
                let p = d.split('-');
                if (p.length === 3) return p[0].length <= 2 ? p[0] + p[1] + p[2] : p[2] + p[1] + p[0]; 
            }
            return d.replace(/-/g, '');
        };

        window.getSetting = function(key) { 
            const s = (DB.pengaturan||[]).find(x => x.key_setting === key); 
            return s ? s.value_setting : ''; 
        };
        
        window.isSiswaAktif = function(s) { return !s.status_siswa || s.status_siswa === 'Aktif'; };

        window.getAvailableUnits = function() {
            if (currentRole === 'guru') {
                const myUnits = currentUser.id_unit_multi ? String(currentUser.id_unit_multi).split(',') : [];
                return (DB.unit || []).filter(u => myUnits.includes(u.id));
            }
            return DB.unit || [];
        };

        window.canGuruAccessSiswa = function(siswaId) {
            if (currentRole === 'admin' || currentRole === 'ortu') return true;
            const sis = maps.siswa[siswaId];
            return sis ? (currentUser.id_unit_multi||'').split(',').includes(maps.kelas[sis.id_kelas]?.id_unit) : false;
        };

        window.canGuruAccessLaporanSiswa = function(siswaId) {
            if (currentRole === 'admin' || currentRole === 'ortu') return true;
            const sis = maps.siswa[siswaId];
            if (!sis) return false;
            const isWali = maps.kelas[sis.id_kelas]?.id_wali_kelas === currentUser.id;
            const isGuruHal = maps.halaqoh[sis.id_halaqoh]?.id_guru_utama === currentUser.id || maps.halaqoh[sis.id_halaqoh]?.id_guru_pendamping === currentUser.id;
            const isGuruHalAsr = sis.id_halaqoh_asrama && (maps.halaqoh[sis.id_halaqoh_asrama]?.id_guru_utama === currentUser.id || maps.halaqoh[sis.id_halaqoh_asrama]?.id_guru_pendamping === currentUser.id);
            return isWali || isGuruHal || isGuruHalAsr;
        };

        window.hasLaporanAccess = function() {
            if (currentRole === 'admin' || currentRole === 'ortu') return true;
            const isWali = (DB.kelas||[]).some(k => k.id_wali_kelas === currentUser.id);
            const isGuruHal = (DB.halaqoh||[]).some(h => h.id_guru_utama === currentUser.id || h.id_guru_pendamping === currentUser.id);
            return isWali || isGuruHal;
        };

        window.getAccessibleStudents = function() {
            if(currentRole === 'ortu') return currentUser.anak || [];
            if(currentRole === 'admin') return DB.siswa || [];
            return (DB.siswa || []).filter(s => window.canGuruAccessLaporanSiswa(s.id));
        };

        window.buildKelasOptions = function(unitId, defaultText = "Semua Kelas") {
            let arr = DB.kelas || [];
            if (unitId) arr = arr.filter(k => k.id_unit === unitId);
            else if (currentRole === 'guru') arr = arr.filter(k => (currentUser.id_unit_multi||'').split(',').includes(k.id_unit));
            return `<option value="">${defaultText}</option>` + arr.map(k=>`<option value="${k.id}">${k.nama_kelas}</option>`).join('');
        };

        window.filterByWaktu = function(data, fWaktu, dateField = 'tgl') {
            if(!fWaktu || fWaktu === 'semua') return data;
            const now = new Date();
            const currMonth = now.getMonth() + 1;
            const currYear = now.getFullYear();
            const currDate = now.toISOString().split('T')[0];
            return data.filter(d => {
                if(!d[dateField]) return false;
                if(fWaktu === 'hari_ini') return d[dateField] === currDate;
                if(fWaktu === 'bulan_ini') {
                    const parts = d[dateField].split('-');
                    return parts.length === 3 && parseInt(parts[1]) === currMonth && parseInt(parts[0]) === currYear;
                }
                return true;
            });
        };

        window.getNamaGuru = function(id) { return maps.guru[id] ? maps.guru[id].nama_lengkap : '-'; };
        window.getJabatanGuru = function(id_jabatan_multi) { return id_jabatan_multi ? id_jabatan_multi.split(',').map(id => maps.jabatan[id] ? maps.jabatan[id].nama_jabatan : '').filter(Boolean).join(', ') : '-'; };
        window.getNamaKelas = function(id) { return maps.kelas[id] ? maps.kelas[id].nama_kelas : '-'; };
        window.getWaliKelas = function(id_kelas) { return maps.kelas[id_kelas] ? window.getNamaGuru(maps.kelas[id_kelas].id_wali_kelas) : '-'; };
        window.getNamaHalaqoh = function(id) { return maps.halaqoh[id] ? maps.halaqoh[id].nama_halaqoh : '-'; };
        window.getSiswaObj = function(id) { return maps.siswa[id] || {}; };

        window.buildMaps = function() {
            maps.unit = {}; if(DB.unit) DB.unit.forEach(u => maps.unit[u.id] = u);
            maps.guru = {}; if(DB.guru) DB.guru.forEach(g => maps.guru[g.id] = g);
            maps.kelas = {}; if(DB.kelas) DB.kelas.forEach(k => maps.kelas[k.id] = k);
            maps.halaqoh = {}; if(DB.halaqoh) DB.halaqoh.forEach(h => maps.halaqoh[h.id] = h);
            maps.jabatan = {}; if(DB.jabatan) DB.jabatan.forEach(j => maps.jabatan[j.id] = j);
            maps.siswa = {}; if(DB.siswa) DB.siswa.forEach(s => maps.siswa[s.id] = s);
        };

        // ====================================================================================
        // MENU KONFIGURASI
        // ====================================================================================
        var MENUS = [
            { id: 'dashboard', label: 'Dashboard', icon: 'fa-home', roles: ['admin', 'guru'], action: function() { window.renderDashboard(); } },
            { label: 'LEADERBOARD', isHeader: true, roles: ['admin', 'guru'] },
            { id: 'lap_leaderboard', label: 'Leaderboard', icon: 'fa-trophy', roles: ['admin', 'guru'], action: function() { window.renderLeaderboard(); } },
            { label: 'MASTER DATA', isHeader: true, roles: ['admin'] },
            { id: 'm_unit', label: 'Data Unit Sekolah', icon: 'fa-building', roles: ['admin'], action: function() { window.renderCRUD('unit'); } },
            { id: 'm_jabatan', label: 'Data Jabatan', icon: 'fa-tags', roles: ['admin'], action: function() { window.renderCRUD('jabatan'); } },
            { id: 'm_kelas', label: 'Data Kelas', icon: 'fa-school', roles: ['admin'], action: function() { window.renderCRUD('kelas'); } },
            { id: 'm_halaqoh', label: 'Data Halaqoh', icon: 'fa-users', roles: ['admin'], action: function() { window.renderCRUD('halaqoh'); } },
            { label: 'MASTER PENGGUNA', isHeader: true, roles: ['admin'] },
            { id: 'm_admin', label: 'Manajemen Admin', icon: 'fa-user-shield', roles: ['admin'], action: function() { window.renderCRUD('admin'); } },
            { id: 'm_guru', label: 'Data Guru', icon: 'fa-chalkboard-user', roles: ['admin'], action: function() { window.currentGuruFilter = ''; window.currentGuruUnitFilter = ''; window.renderCRUD('guru'); } },
            { id: 'm_siswa', label: 'Data Siswa', icon: 'fa-user-graduate', roles: ['admin'], action: function() { window.renderSiswa(); } },
            { label: 'RUANG TTQ', isHeader: true, roles: ['admin', 'guru'], requireTTQ: true },
            { id: 'in_setoran', label: 'Input Setoran', icon: 'fa-pen', roles: ['admin', 'guru'], action: function() { window.renderInputSetoran(); }, requireTTQ: true },
            { id: 'rw_setoran', label: 'Riwayat Setoran', icon: 'fa-history', roles: ['admin', 'guru'], action: function() { window.renderRiwayatSetoran(); }, requireTTQ: true },
            { label: 'RUANG TASMI', isHeader: true, roles: ['admin', 'guru'] },
            { id: 'in_tasmi', label: 'Input Tasmi', icon: 'fa-star', roles: ['admin', 'guru'], action: function() { window.renderInputTasmi(); }, requirePenguji: true },
            { id: 'dt_tasmi', label: 'Riwayat Ujian Tasmi', icon: 'fa-list-check', roles: ['admin', 'guru'], action: function() { window.renderDataTasmi(); }, requirePenguji: true },
            { id: 'pr_tasmi', label: 'Progress Ujian Tasmi', icon: 'fa-chart-pie', roles: ['admin', 'guru'], action: function() { window.renderProgressTasmi(); } },
            { id: 'detail_tasmi', label: 'Detail Nilai Tasmi', icon: 'fa-file-signature', roles: ['admin', 'ortu'], action: function() { window.renderDetailTasmi(); } },
            { label: 'LAPORAN & PENGATURAN', isHeader: true, roles: ['admin', 'guru', 'ortu'] },
            { id: 'lap_individu', label: 'Laporan Rincian Setoran', icon: 'fa-file-lines', roles: ['admin'], action: function() { window.renderLaporanUI('individu'); } },
            { id: 'lap_capaian', label: 'Laporan Rekap Capaian', icon: 'fa-chart-bar', roles: ['admin', 'guru', 'ortu'], requireLaporanAccess: true, action: function() { window.renderLaporanUI('capaian'); } },
            { id: 'lap_setoran', label: 'Laporan Seluruh Setoran', icon: 'fa-book-open', roles: ['admin', 'guru'], action: function() { window.renderLaporanSetoran(); } },
            { id: 'm_pengaturan', label: 'Pengaturan', icon: 'fa-cog', roles: ['admin'], action: function() { window.renderPengaturan(); } }
        ];

        // ====================================================================================
        // OTENTIKASI & APLIKASI CORE
        // ====================================================================================
        window.applySettingsToUI = function() {
            const appName = window.getSetting('nama_aplikasi') || 'e-Tasmi';
            const el = document.getElementById('appNameDisplay'); 
            if (el) el.innerText = appName; 
            document.title = appName + ' - Sistem Tahfizh';
            
            const loginTitle = window.getSetting('nama_sistem_login') || 'Sistem Akademik Tahfizh';
            const elLoginTitle = document.getElementById('loginTitleDisplay'); 
            if (elLoginTitle) elLoginTitle.innerText = loginTitle;
        };

        window.fetchAPI = async function(action, payload = {}) {
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action, ...payload }) });
                return await res.json();
            } catch (err) {
                return { success: false, message: 'Koneksi ke server gagal. Pastikan URL API Apps Script Anda sudah benar.' };
            }
        };

        window.initApp = async function(silent = false) {
            const btnRefresh = document.getElementById('btnRefreshGlobal');
            if (silent) { if(btnRefresh) btnRefresh.classList.add('animate-spin', 'text-emerald-500'); } 
            else { window.showLoading("Sinkronisasi Data..."); }

            const res = await window.fetchAPI('getAllData');
            
            if (silent) { if(btnRefresh) btnRefresh.classList.remove('animate-spin', 'text-emerald-500'); } 
            else { window.hideLoading(); }

            if (res.success && res.data) {
                try {
                    DB = res.data;
                    ['unit','kelas','halaqoh','guru'].forEach(k => { 
                        if(DB[k] && Array.isArray(DB[k])) DB[k].sort((a,b) => (a[`nama_${k==='guru'?'lengkap':k}`] || '').localeCompare(b[`nama_${k==='guru'?'lengkap':k}`] || '')); 
                    });

                    if (!DB.pengaturan || !Array.isArray(DB.pengaturan)) DB.pengaturan = [];
                    if (!DB.pengaturan.find(p => p.key_setting === 'url_logo')) DB.pengaturan.push({ key_setting: 'url_logo', value_setting: '' });
                    if (!DB.pengaturan.find(p => p.key_setting === 'nama_aplikasi')) DB.pengaturan.push({ key_setting: 'nama_aplikasi', value_setting: 'e-Tasmi' });
                    if (!DB.pengaturan.find(p => p.key_setting === 'nama_sistem_login')) DB.pengaturan.push({ key_setting: 'nama_sistem_login', value_setting: 'Sistem Akademik Tahfizh' });

                    localStorage.setItem('tasmi_db', JSON.stringify(DB)); 
                    window.buildMaps(); window.applySettingsToUI();
                    
                    if(currentUser) {
                        if (currentRole === 'guru') {
                            const freshGuru = (DB.guru||[]).find(g => g.id === currentUser.id);
                            if (freshGuru) currentUser = freshGuru; 
                        } else if (currentRole === 'admin') {
                            const freshAdmin = (DB.admin||[]).find(a => a.id === currentUser.id);
                            if (freshAdmin) currentUser = freshAdmin;
                        } else if (currentRole === 'ortu') {
                            currentUser.anak = (DB.siswa||[]).filter(s => s.no_wa_ortu === currentUser.id);
                        }
                        
                        localStorage.setItem('tasmi_user', JSON.stringify(currentUser));
                        window.refreshSidebarMenu();

                        const pt = document.getElementById('pageTitle'); 
                        const currentPage = pt ? pt.innerText : '';
                        const activeMenu = MENUS.find(m => m.label === currentPage);
                        if(activeMenu && activeMenu.action) activeMenu.action();
                    }
                } catch(err) { console.error("Kesalahan parsing data:", err); }
            } else if (!silent && !res.success) { Swal.fire('Error Database', res.message || 'Gagal mengambil data dari server.', 'error'); }
        };

        window.handleLogin = async function(e) {
            e.preventDefault();
            const user = String(document.getElementById('loginUsername').value).trim();
            const pass = String(document.getElementById('loginPassword').value).trim();
            window.showLoading("Verifikasi...");
            
            try {
                if (Object.keys(DB).length === 0 || !DB.admin || !DB.guru || !DB.siswa) await window.initApp(true); 
                if (!DB || Object.keys(DB).length === 0 || !DB.admin) {
                    window.hideLoading(); Swal.fire('Koneksi Gagal', 'Sistem tidak dapat terhubung ke Database. Pastikan URL Google Apps Script sudah benar.', 'error'); return;
                }

                const matchWa = function(dbWa, inputWa) { 
                    let a = String(dbWa || '').trim(), b = String(inputWa || '').trim(); 
                    if (a.startsWith('8') && b.startsWith('08')) a = '0' + a; 
                    return a === b; 
                };

                const admin = (DB.admin||[]).find(x => String(x.username).trim() === user && String(x.password).trim() === pass);
                if (admin) { window.setSession(admin, 'admin'); return; }

                const guru = (DB.guru||[]).find(x => matchWa(x.no_wa, user) && window.formatDateToDDMMYYYY(x.tgl_lahir) === pass);
                if (guru) { window.setSession(guru, 'guru'); return; }

                const siswaOrtu = (DB.siswa||[]).find(x => matchWa(x.no_wa_ortu, user) && window.formatDateToDDMMYYYY(x.tgl_lahir) === pass);
                if (siswaOrtu) { window.setSession({ id: user, nama: 'Ortu dari ' + siswaOrtu.nama_lengkap, anak: DB.siswa.filter(s => matchWa(s.no_wa_ortu, user)) }, 'ortu'); return; }

                window.hideLoading(); Swal.fire('Gagal Login', 'Username atau Password salah!', 'error');
            } catch(err) { console.error(err); window.hideLoading(); Swal.fire('Sistem Error', 'Terjadi kesalahan sistem saat login: ' + err.message, 'error'); }
        };

            if(document.getElementById('loginScreen')) document.getElementById('loginScreen').classList.add('hidden');
            if(document.getElementById('appContainer')) document.getElementById('appContainer').classList.remove('hidden');

            if(document.getElementById('userNameDisplay')) document.getElementById('userNameDisplay').innerText = dName;
            if(document.getElementById('userRoleDisplay')) document.getElementById('userRoleDisplay').innerText = role.toUpperCase();

                    if (menu.requirePenguji && currentRole === 'guru' && !isPenguji) return;

        window.openForm = function(tableKey, id = null) {
            const schema = schemas[tableKey]; const data = id ? DB[tableKey].find(x => x.id === id) : {};
            const mt = document.getElementById('modalTitle'); if(mt) mt.innerText = (id ? 'Edit ' : 'Tambah ') + schema.title;

                if (f.type === 'select') {
                    formHtml += `<select id="field_${f.name}" ${f.required?'required':''} class="w-full border rounded p-2 focus:ring-emerald-500 focus:border-emerald-500"><option value="">-- Pilih --</option>`;

                } else if (f.type === 'multi-select') {
                    const vals = val ? val.split(',') : [];
                    formHtml += `<select id="field_${f.name}" multiple ${f.required?'required':''} class="w-full border rounded p-2 focus:ring-emerald-500 focus:border-emerald-500 h-24">`;

                } else {
                    formHtml += `<input type="${f.type}" id="field_${f.name}" value="${val}" ${f.required?'required':''} class="w-full border rounded p-2 focus:ring-emerald-500 focus:border-emerald-500">`;

        window.saveForm = async function(tableKey) {
            const form = document.getElementById('dynamicForm'); if(!form.checkValidity()) { form.reportValidity(); return; }
            const schema = schemas[tableKey]; let payload = {};
            schema.fields.forEach(f => {
                const el = document.getElementById(`field_${f.name}`);
                if (f.type === 'multi-select') payload[f.name] = Array.from(el.selectedOptions).map(opt => opt.value).join(',');
                else if (f.type === 'checkbox') payload[f.name] = el.checked;
                else payload[f.name] = el.value;
            });
            const id = document.getElementById('formId').value; window.showLoading("Menyimpan..."); const res = await window.fetchAPI(id ? 'update' : 'insert', { sheet: tableKey, id, data: payload }); window.hideLoading();
            if (res.success) { window.closeModal(); Swal.fire('Berhasil', 'Data disimpan', 'success'); await window.initApp(); window.renderCRUD(tableKey); } else { Swal.fire('Error', res.message || 'Gagal menyimpan data.', 'error'); }

            const fWaktuZ = document.getElementById('dashFilterWaktuZ')?.value || 'semua';
            const fWaktuM = document.getElementById('dashFilterWaktuM')?.value || 'semua';

            const buildTop5HTML = (kategori, filterWaktu) => {
                let dataKat = (DB.setoran||[]).filter(s => s.kategori === kategori && window.isSiswaAktif(window.getSiswaObj(s.id_siswa)) && window.canGuruAccessSiswa(s.id_siswa));
                dataKat = window.filterByWaktu(dataKat, filterWaktu, 'tgl');
                
                let rankMap = {};
                dataKat.forEach(s => {
                    if(!rankMap[s.id_siswa]) rankMap[s.id_siswa] = { count: 0, hal: 0 };
                    rankMap[s.id_siswa].count += 1;
                    let valHal = parseFloat(s.jml_halaman);
                    rankMap[s.id_siswa].hal += (isNaN(valHal) ? 0 : valHal);
                });

                let rankArr = Object.keys(rankMap).map(id => ({ id_siswa: id, count: rankMap[id].count, hal: rankMap[id].hal }));
                rankArr.sort((a,b) => b.count - a.count || b.hal - a.hal);
                const top5 = rankArr.slice(0, 5);

                let html = `<table class="dt-table text-sm w-full whitespace-nowrap"><thead><tr><th>Rank</th><th>Nama Siswa (Kelas)</th><th>Jml Setoran</th><th>Jml Halaman</th></tr></thead><tbody>`;

        window.downloadFormatSiswa = function() {
            const wb = XLSX.utils.book_new();
            const wsData = [
                ["Nama Lengkap", "L/P (L/P)", "Tempat Lahir", "Tgl Lahir (YYYY-MM-DD)", "ID Kelas", "ID Halaqoh Sekolah", "ID Halaqoh Asrama", "Nama Ayah", "Nama Ibu", "No WA Ortu", "Alamat", "Status Siswa (Aktif/Lulus/Pindah)"],
                ["Siswa Contoh", "L", "Jakarta", "2010-01-01", DB.kelas[0]?.id || "K1", DB.halaqoh[0]?.id || "H1", "", "Nama Ayah", "Nama Ibu", "08123456789", "Jl. Contoh", "Aktif"]
            ];
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wscols = [{wch:20}, {wch:10}, {wch:15}, {wch:22}, {wch:15}, {wch:18}, {wch:18}, {wch:15}, {wch:15}, {wch:15}, {wch:25}, {wch:20}];
            ws['!cols'] = wscols;
            XLSX.utils.book_append_sheet(wb, ws, "Template Siswa");

            const wsRefData = [["JENIS", "NAMA", "ID UNTUK DI COPY"]];
            (DB.kelas||[]).forEach(k => wsRefData.push(["Kelas", k.nama_kelas, k.id]));
            (DB.halaqoh||[]).forEach(h => wsRefData.push(["Halaqoh " + (h.kategori_halaqoh || 'Reguler'), h.nama_halaqoh, h.id]));
            const wsRef = XLSX.utils.aoa_to_sheet(wsRefData);
            const wscolsRef = [{wch:15}, {wch:25}, {wch:20}];
            wsRef['!cols'] = wscolsRef;
            XLSX.utils.book_append_sheet(wb, wsRef, "Referensi ID");

            XLSX.writeFile(wb, "Format_Import_Siswa.xlsx");
        };

        window.prosesImportSiswa = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet, {raw: false});

                    if (json.length === 0) return Swal.fire('Error', 'File kosong atau format salah.', 'error');

                    window.showLoading("Mengimpor Data...");
                    let successCount = 0;
                    
                    for (let row of json) {
                        const payload = {
                            nama_lengkap: row["Nama Lengkap"],
                            jk: row["L/P (L/P)"],
                            tmp_lahir: row["Tempat Lahir"],
                            tgl_lahir: row["Tgl Lahir (YYYY-MM-DD)"],
                            id_kelas: row["ID Kelas"],
                            id_halaqoh: row["ID Halaqoh Sekolah"],
                            id_halaqoh_asrama: row["ID Halaqoh Asrama"] || "",
                            nama_ayah: row["Nama Ayah"],
                            nama_ibu: row["Nama Ibu"],
                            no_wa_ortu: row["No WA Ortu"],
                            alamat: row["Alamat"],
                            status_siswa: row["Status Siswa (Aktif/Lulus/Pindah)"] || "Aktif"
                        };
                        
                        if(payload.nama_lengkap && payload.tgl_lahir && payload.no_wa_ortu) {
                            const res = await window.fetchAPI('insert', { sheet: 'siswa', data: payload });
                            if(res.success) successCount++;
                        }
                    }
                    
                    const importInput = document.getElementById('importSiswaInput');
                    if(importInput) importInput.value = ''; 
                    
                    window.hideLoading();
                    Swal.fire('Selesai', `Berhasil mengimpor ${successCount} data siswa.`, 'success');
                    await window.initApp();
                    window.renderSiswa();
                } catch(err) {
                    window.hideLoading();
                    Swal.fire('Error', 'Gagal membaca file Excel.', 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        };

        window.toggleAllSiswa = function(el) {

        window.openFormSiswa = function(id = null) {
            const data = id ? DB.siswa.find(x => x.id === id) : {};
            const modalTitle = document.getElementById('modalTitle');
            if(modalTitle) modalTitle.innerText = (id ? 'Edit ' : 'Tambah ') + 'Siswa';
            
            const halSekolah = (DB.halaqoh||[]).filter(h => h.kategori_halaqoh !== 'Asrama');
            const halAsrama = (DB.halaqoh||[]).filter(h => h.kategori_halaqoh === 'Asrama');

            const fields = [
                {name:'nama_lengkap', label:'Nama Lengkap', type:'text', req:true},
                {name:'jk', label:'L/P', type:'select', opt:[{v:'L',t:'Laki-laki'},{v:'P',t:'Perempuan'}], req:true},
                {name:'tmp_lahir', label:'Tempat Lahir', type:'text', req:true},
                {name:'tgl_lahir', label:'Tgl Lahir (Format: YYYY-MM-DD)', type:'date', req:true},
                {name:'id_kelas', label:'Kelas', type:'select', opt:(DB.kelas||[]).map(k=>({v:k.id,t:k.nama_kelas})), req:true},
                {name:'id_halaqoh', label:'Halaqoh Sekolah (Utama)', type:'select', opt:halSekolah.map(h=>({v:h.id,t:h.nama_halaqoh})), req:true},
                {name:'id_halaqoh_asrama', label:'Halaqoh Asrama (Opsional)', type:'select', opt:[{v:'',t:'-- Tidak Mondok --'}, ...halAsrama.map(h=>({v:h.id,t:h.nama_halaqoh}))], req:false},
                {name:'status_siswa', label:'Status Siswa', type:'select', opt:[{v:'Aktif',t:'Aktif'},{v:'Lulus',t:'Lulus (Alumni)'},{v:'Pindah',t:'Pindah/Keluar'}], req:true},
                {name:'nama_ayah', label:'Nama Ayah', type:'text', req:true},
                {name:'nama_ibu', label:'Nama Ibu', type:'text', req:true},
                {name:'no_wa_ortu', label:'No WA Ortu (Jd Username Ortu)', type:'text', req:true},
                {name:'alamat', label:'Alamat', type:'text', req:true}
            ];

            let html = `<form id="formSiswa" class="grid grid-cols-1 md:grid-cols-2 gap-4"><input type="hidden" id="siswaId" value="${id||''}"><div class="col-span-full font-semibold text-emerald-700 border-b pb-2 mb-2">Data Akademik</div>`;
            
            fields.forEach((f, i) => {
                if(f.name === 'nama_ayah') {
                    html += `<div class="col-span-full font-semibold text-emerald-700 border-b pb-2 mb-2 mt-4">Data Orang Tua</div>`;
                }
                let val = data[f.name] !== undefined ? data[f.name] : (f.name === 'status_siswa' ? 'Aktif' : '');
                html += `<div><label class="block text-xs font-medium text-gray-700 mb-1">${f.label}</label>`;
                
                if(f.type === 'select') {
                    html += `<select id="s_${f.name}" ${f.req?'required':''} class="w-full border rounded p-2 text-sm focus:ring-emerald-500 outline-none">`;
                    if(f.req && f.name !== 'status_siswa') html += `<option value="">-- Pilih --</option>`;
                    f.opt.forEach(o => html += `<option value="${o.v}" ${val === o.v ? 'selected' : ''}>${o.t}</option>`);
                    html += `</select>`;
                } else {
                    html += `<input type="${f.type}" id="s_${f.name}" value="${val}" ${f.req?'required':''} class="w-full border rounded p-2 text-sm focus:ring-emerald-500 outline-none">`;
                }
                html += `</div>`;
            });
            html += `</form>`;
            
            const modalBody = document.getElementById('modalBody');
            if(modalBody) modalBody.innerHTML = html;
            
            const btnSave = document.getElementById('btnSaveModal'); 
            if(btnSave) {
                btnSave.onclick = async () => {
                    const form = document.getElementById('formSiswa');
                    if(!form.checkValidity()) { form.reportValidity(); return; }
                    
                    let payload = {};
                    fields.forEach(f => payload[f.name] = document.getElementById(`s_${f.name}`).value);
                    
                    window.showLoading("Menyimpan...");
                    const res = await window.fetchAPI(id ? 'update' : 'insert', { sheet: 'siswa', id, data: payload });
                    window.hideLoading();
                    
                    if (res.success) {
                        window.closeModal();
                        await window.initApp();
                        window.renderSiswa();
                    } else {
                        Swal.fire('Error', res.message, 'error');
                    }
                };
            }
            document.getElementById('generalModal')?.classList.remove('hidden');
        };

        window.pindahMassal = async function() {
            const checkboxes = document.querySelectorAll('.check-siswa:checked');
            const ids = Array.from(checkboxes).map(cb => cb.value);
            
            if(ids.length === 0) return Swal.fire('Oops', 'Pilih minimal 1 siswa', 'warning');
            
            const statusAlumni = document.getElementById('massStatus').value;
            const kelas = document.getElementById('massKelas').value;
            const halSekolah = document.getElementById('massHalaqoh').value;
            const halAsrama = document.getElementById('massHalaqohAsrama').value;
            
            if(!statusAlumni && !kelas && !halSekolah && !halAsrama) {
                return Swal.fire('Oops', 'Pilih setidaknya salah satu tujuan update', 'warning');
            }

            window.showLoading("Memproses Update Massal...");
            for(let id of ids) {
                let updateData = {};
                if(statusAlumni) updateData.status_siswa = statusAlumni;
                if(kelas) updateData.id_kelas = kelas;
                if(halSekolah) updateData.id_halaqoh = halSekolah;
                if(halAsrama) updateData.id_halaqoh_asrama = (halAsrama === 'KOSONGKAN') ? '' : halAsrama;
                
                await window.fetchAPI('update', {sheet: 'siswa', id: id, data: updateData});
            }
            window.hideLoading();
            Swal.fire('Berhasil', 'Data siswa massal berhasil diperbarui', 'success');
            await window.initApp();
            window.renderSiswa();
        };

                const sList = (DB.siswa||[]).filter(s => window.isSiswaAktif(s) && (s.id_halaqoh === hId || s.id_halaqoh_asrama === hId));
                sList.forEach(s => {
                    const statusText = (s.id_halaqoh_asrama === hId) ? '(Asrama)' : '(Reguler)';
                    sel.innerHTML += `<option value="${s.id}">${s.nama_lengkap} ${statusText}</option>`;

                sel.classList.remove('bg-gray-50');

                sel.classList.add('bg-gray-50');

        window.toggleFormMateri = function() {
            const kat = document.getElementById('st_kat')?.value;
            const mq = document.getElementById('materiQuraan');
            const ma = document.getElementById('materiAli');
            const jq = document.getElementById('jmlHalQuraanDiv');
            
            if(mq) mq.classList.add('hidden');
            if(ma) ma.classList.add('hidden');
            if(jq) jq.classList.add('hidden');
            
            if(kat === 'Ziyadah' || kat === 'Murojaah' || kat === 'Tahsin Al-Quran') {
                if(mq) mq.classList.remove('hidden');
                if(jq) jq.classList.remove('hidden');
                document.getElementById('st_juz').required = true; 
                document.getElementById('st_surat').required = true; 
                document.getElementById('st_jmlhal_q').required = true;
                
                document.getElementById('st_hal1').required = false; 
                document.getElementById('st_hal2').required = false;
            } else if (kat === 'Tahsin Metode Ali') {
                if(ma) ma.classList.remove('hidden');

        window.calcHal = function() {
            const h1 = parseInt(document.getElementById('st_hal1')?.value) || 0;
            const h2 = parseInt(document.getElementById('st_hal2')?.value) || 0;
            const res = document.getElementById('st_jmlhal_ali');
            if(res && h2 >= h1 && h1 > 0) {
                res.value = (h2 - h1) + 1;
            } else if (res) {
                res.value = '';
            }
        };

        window.saveSetoran = async function(e) {
            e.preventDefault();
            const kat = document.getElementById('st_kat').value;
            let detail = {}; 
            let jmlHal = 0;
            
            if(kat.includes('Ali')) {
                detail = { 
                    jilid: document.getElementById('st_jilid').value, 
                    hal_awal: document.getElementById('st_hal1').value, 
                    hal_akhir: document.getElementById('st_hal2').value 
                };
                jmlHal = document.getElementById('st_jmlhal_ali').value;
            } else {
                detail = { 
                    juz: document.getElementById('st_juz').value, 
                    surat: document.getElementById('st_surat').value, 
                    ayat_awal: document.getElementById('st_ayat1').value, 
                    ayat_akhir: document.getElementById('st_ayat2').value 
                };
                jmlHal = document.getElementById('st_jmlhal_q').value;
            }

            const payload = {
                tgl: document.getElementById('st_tgl').value,
                jam: document.getElementById('st_jam').value,
                id_siswa: document.getElementById('st_siswa').value,
                kategori: kat,
                detail_materi: JSON.stringify(detail),
                jml_halaman: parseFloat(jmlHal),
                predikat: document.getElementById('st_predikat').value,
                catatan: document.getElementById('st_catatan').value,
                id_penginput: currentUser.id
            };

            window.showLoading('Menyimpan Setoran...');
            const res = await window.fetchAPI('insert', {sheet: 'setoran', data: payload});
            window.hideLoading();
            
            if(res.success) {
                Swal.fire('Berhasil', 'Data setoran tersimpan', 'success');
                await window.initApp();
                window.navigate('rw_setoran'); 
            } else {
                Swal.fire('Error', res.message, 'error');

        };

        window.loadSiswaTasmi = function() {
            const uId = document.getElementById('ts_unit')?.value;

            const select = document.getElementById('ts_siswa');
            
            if(!select) return;
            select.innerHTML = '<option value="">-- Pilih Siswa --</option>';
            
            let sList = (DB.siswa||[]).filter(s => window.isSiswaAktif(s) && window.canGuruAccessSiswa(s.id));
            if(klId) sList = sList.filter(s => s.id_kelas === klId);
            else if(uId) sList = sList.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);
            else sList = [];

        window.checkExistingTasmi = function() {
            const siswaId = document.getElementById('ts_siswa')?.value;
            const juz = parseInt(document.getElementById('ts_juz')?.value);
            const container = document.getElementById('formTasmiContainer');
            
            if(!siswaId || !juz) { 
                if(container) container.classList.add('hidden'); 
                return; 
            }
            
            const existing = (DB.tasmi||[]).find(t => t.id_siswa === siswaId && parseInt(t.juz) === juz);
            const hiddenId = document.getElementById('ts_id');
            if(hiddenId) hiddenId.value = existing ? existing.id : '';
            
            let existingNilai = [];
            if(existing) { 
                try { existingNilai = JSON.parse(existing.nilai_per_halaman); } 
                catch(e){} 
            }
            
            const maxHal = window.getJuzPages(juz);
            let html = '';
            for(let i=0; i<maxHal; i++) {
                const val = existingNilai[i] !== undefined ? existingNilai[i] : 0;
                let borderClass = val > 0 ? (val >= 75 ? 'border-emerald-400 bg-emerald-50' : 'border-red-400 bg-red-50') : 'border-gray-300 bg-white';
                html += `
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Halaman ${i+1}</label>
                        <input type="number" min="0" max="100" class="inp-tasmi w-full border ${borderClass} p-2 rounded text-center font-bold text-gray-800 focus:ring-yellow-500 outline-none transition-colors" oninput="window.calcTasmi()" value="${val}">
                    </div>
                `;
            }
            
            const gnt = document.getElementById('gridNilaiTasmi'); 
            if(gnt) gnt.innerHTML = html;
            if(container) container.classList.remove('hidden');
            
            window.calcTasmi();
        };

        window.calcTasmi = function() {
            const inps = document.querySelectorAll('.inp-tasmi'); 
            let sum = 0; 
            let b75 = false; 
            let filled = 0; 
            let total = inps.length;
            
            inps.forEach(inp => { 
                let v = parseFloat(inp.value) || 0; 
                if(v > 100) { 
                    inp.value = 100; 
                    v = 100; 
                    Swal.fire('Peringatan','Nilai maksimal per halaman adalah 100','warning'); 
                } 
                if(v > 0) { 
                    filled++; 
                    if(v < 75) b75 = true; 
                    inp.className = `inp-tasmi w-full border p-2 rounded text-center font-bold text-gray-800 focus:ring-yellow-500 outline-none transition-colors ${v >= 75 ? 'border-emerald-400 bg-emerald-50' : 'border-red-400 bg-red-50'}`;
                } else {
                    inp.className = `inp-tasmi w-full border border-gray-300 bg-white p-2 rounded text-center font-bold text-gray-800 focus:ring-yellow-500 outline-none transition-colors`;
                }
                sum += v; 
            });
            
            const rata = total > 0 ? (sum / total).toFixed(2) : 0; 
            const elRata = document.getElementById('ts_rata'); 
            if(elRata) elRata.innerText = rata;
            
            const stEl = document.getElementById('ts_status');
            if(stEl) {
                if (filled < total) { 
                    stEl.innerText = "Sedang Ujian"; 
                    stEl.className = "ml-4 text-sm font-bold px-3 py-1 rounded-full bg-yellow-500 text-white shadow-sm"; 
                } 
                else {
                    if(rata >= 75 && !b75) { 
                        stEl.innerText = "LULUS"; 
                        stEl.className = "ml-4 text-sm font-bold px-3 py-1 rounded-full bg-emerald-500 text-white shadow-sm"; 
                    }
                    else { 
                        stEl.innerText = "Belum Lulus"; 
                        stEl.className = "ml-4 text-sm font-bold px-3 py-1 rounded-full bg-red-500 text-white shadow-sm"; 
                    }
                }
            }
        };

        window.simpanTasmi = async function() {
            const sId = document.getElementById('ts_siswa').value;
            if(!sId) return Swal.fire('Oops','Pilih siswa terlebih dahulu','warning');
            
            const inputs = document.querySelectorAll('.inp-tasmi');
            let nilaiArr = []; 
            inputs.forEach(inp => nilaiArr.push(parseFloat(inp.value) || 0));
            
            const exId = document.getElementById('ts_id').value;
            const stEl = document.getElementById('ts_status');
            let stText = stEl ? stEl.innerText : '';
            
            let finalStatus = 'Lulus';
            if(stText.includes('Belum')) finalStatus = 'Belum Lulus';
            else if(stText.includes('Sedang')) finalStatus = 'Sedang Ujian';

            const p = { 
                tgl: document.getElementById('ts_tgl').value, 
                id_siswa: sId, 
                juz: document.getElementById('ts_juz').value, 
                nilai_per_halaman: JSON.stringify(nilaiArr), 
                rata_rata: parseFloat(document.getElementById('ts_rata').innerText), 
                status: finalStatus, 
                id_penguji: currentUser.id 
            };

            window.showLoading(exId ? 'Memperbarui Nilai Tasmi...' : 'Menyimpan Nilai Tasmi...');
            const res = await window.fetchAPI(exId ? 'update' : 'insert', {sheet: 'tasmi', id: exId, data: p});
            window.hideLoading();
            
            if(res.success) { 
                Swal.fire('Berhasil', 'Nilai Ujian Tasmi berhasil disimpan', 'success'); 
                await window.initApp(); 
                window.navigate('dt_tasmi'); 
            } else {
                Swal.fire('Gagal', res.message, 'error');
            }
        };

            (DB.tasmi||[]).forEach(t => tasmiStatusMap.set(t.id_siswa + '_' + t.juz, t.status));

            const siswaLulusCount = {};
            dataSiswa.forEach(s => {
                let count = 0;
                for(let i=1; i<=30; i++) {
                    if(tasmiStatusMap.get(s.id + '_' + i) === 'Lulus') count++;
                }
                siswaLulusCount[s.id] = count;
            });

            dataSiswa.sort((a, b) => {
                const diff = siswaLulusCount[b.id] - siswaLulusCount[a.id];
                if (diff === 0) return (a.nama_lengkap || '').localeCompare(b.nama_lengkap || '');
                return diff;
            });

            let chartLabels = [];
            let dataLulusPerJuz = [];
            let dataSedangPerJuz = [];
            let dataBelumPerJuz = [];
            
            for (let i = 1; i <= 30; i++) {
                chartLabels.push('Juz ' + i);
                let countLulus = 0, countSedang = 0;
                dataSiswa.forEach(s => {
                    const status = tasmiStatusMap.get(s.id + '_' + i);
                    if (status === 'Lulus') countLulus++;
                    else if (status === 'Sedang Ujian') countSedang++;
                });
                dataLulusPerJuz.push(countLulus);
                dataSedangPerJuz.push(countSedang);
                dataBelumPerJuz.push(dataSiswa.length - countLulus - countSedang);
            }

            const canvasEl = document.getElementById('progressChartCanvas');
            if(canvasEl) {
                const ctx = canvasEl.getContext('2d');
                if (progressChartInstance) progressChartInstance.destroy();
                progressChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: { 
                        labels: chartLabels, 
                        datasets: [
                            { label: 'Lulus', data: dataLulusPerJuz, backgroundColor: '#10b981', borderRadius: 4 },
                            { label: 'Sedang Ujian', data: dataSedangPerJuz, backgroundColor: '#f59e0b', borderRadius: 4 },
                            { label: 'Belum', data: dataBelumPerJuz, backgroundColor: '#ef4444', borderRadius: 4 }
                        ]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        interaction: { mode: 'index', intersect: false }, 
                        scales: { 
                            x: { stacked: true, grid: { display: false } }, 
                            y: { stacked: true, ticks: { stepSize: 1 }, title: { display: true, text: 'Jumlah Siswa' } } 
                        },
                        plugins: {
                            legend: { position: 'top' }
                        }
                    }
                });
            }

            let html = `
                <table class="dt-table text-sm text-center whitespace-nowrap border-collapse">
                    <thead>
                        <tr>
                            <th class="text-left min-w-[200px] border-r border-gray-300">Nama Siswa</th>
                            <th class="px-2 text-xs font-bold text-emerald-700 bg-emerald-100 border-r border-emerald-200" title="Jumlah Juz Lulus">Lulus</th>
                            <th class="px-2 text-xs font-bold text-amber-700 bg-amber-100 border-r border-amber-200" title="Jumlah Juz Sedang Ujian">Sedang</th>
                            <th class="px-2 text-xs font-bold text-red-700 bg-red-100 border-r border-red-200" title="Jumlah Juz Belum Lulus">Belum</th>
                            ${Array.from({length:30},(_,i)=>`<th class="px-1 text-[10px]" title="Juz ${i+1}">${i+1}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            dataSiswa.forEach((s, index) => {
                let tdJuz = '', lulusCount = 0, sedangCount = 0;
                
                for(let i=1; i<=30; i++) {
                    const status = tasmiStatusMap.get(s.id + '_' + i);
                    if (status === 'Lulus') { 
                        lulusCount++; 
                        tdJuz += `<td class="p-1 border-b border-gray-100"><i class="fas fa-check-circle text-emerald-500" title="Juz ${i}: Lulus"></i></td>`; 
                    } else if (status === 'Sedang Ujian') { 
                        sedangCount++; 
                        tdJuz += `<td class="p-1 border-b border-gray-100"><i class="fas fa-hourglass-half text-amber-500" title="Juz ${i}: Sedang Ujian"></i></td>`; 
                    } else { 
                        tdJuz += `<td class="p-1 border-b border-gray-100"><span class="text-gray-200">-</span></td>`; 
                    }
                }
                
                let belumCount = 30 - lulusCount - sedangCount;
                let badgeHtml = '';
                
                if (lulusCount > 0 && index < 5) {
                    const rank = index + 1;
                    if(rank === 1) badgeHtml = '<i class="fas fa-trophy text-yellow-500 ml-1.5 text-lg drop-shadow-sm" title="Peringkat 1 Tasmi Terbanyak"></i>';
                    else if(rank === 2) badgeHtml = '<i class="fas fa-medal text-gray-400 ml-1.5 text-base drop-shadow-sm" title="Peringkat 2 Tasmi"></i>';
                    else if(rank === 3) badgeHtml = '<i class="fas fa-medal text-amber-600 ml-1.5 text-base drop-shadow-sm" title="Peringkat 3 Tasmi"></i>';
                    else badgeHtml = `<span class="ml-1.5 bg-gradient-to-r from-emerald-100 to-emerald-200 text-emerald-800 text-[10px] px-2 py-0.5 rounded-md font-bold shadow-sm relative -top-0.5">Top ${rank}</span>`;
                }

                html += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="text-left border-r border-gray-200 whitespace-nowrap min-w-[200px] border-b border-gray-100">
                            <b>${s.nama_lengkap || 'Siswa Dihapus'}</b> ${badgeHtml}<br>
                            <span class="text-[10px] text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">${window.getNamaKelas(s.id_kelas)}</span>
                        </td>
                        <td class="font-bold text-emerald-700 bg-emerald-50/50 border-r border-emerald-100 text-base border-b border-gray-100">${lulusCount}</td>
                        <td class="font-bold text-amber-700 bg-amber-50/50 border-r border-amber-100 text-base border-b border-gray-100">${sedangCount}</td>
                        <td class="font-bold text-red-700 bg-red-50/50 border-r border-red-100 text-base border-b border-gray-100">${belumCount}</td>
                        ${tdJuz}
                    </tr>
                `;
            });
            
            if (dataSiswa.length === 0) {
                html += `<tr><td colspan="34" class="text-center py-6 text-gray-500">Belum ada data siswa sesuai filter</td></tr>`;
            }
            
            html += `</tbody></table>`;
            const prc = document.getElementById('prTasmiTableContainer'); 
            if(prc) prc.innerHTML = html;
        };

        window.loadSiswaDetailTasmi = function() {
            const uId = document.getElementById('dtlUnit')?.value;
            const kId = document.getElementById('dtlKelas')?.value;
            const sel = document.getElementById('dtlSiswa');
            if(!sel) return;
            
            sel.innerHTML = '<option value="">-- Pilih Siswa --</option>';
            
            let filtered = (DB.siswa||[]).filter(s => window.canGuruAccessSiswa(s.id));

            else if(uId) filtered = filtered.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);

            if(uId || kId) {
                sel.innerHTML += '<option value="semua" class="font-bold text-emerald-700">-- Tampilkan Semua di Kelas/Unit --</option>';
                filtered.forEach(s => { 
                    const st = s.status_siswa && s.status_siswa !== 'Aktif' ? `(${s.status_siswa})` : ''; 
                    sel.innerHTML += `<option value="${s.id}">${s.nama_lengkap} ${st}</option>`;

                sel.classList.remove('bg-gray-100');

                sel.classList.add('bg-gray-100');

            const dtc = document.getElementById('detailTasmiContent');

                            <span class="bg-white border border-gray-200 px-3 py-1 rounded shadow-sm">Rata-rata: <b class="${tData.rata_rata >= 75 ? 'text-emerald-600' : 'text-red-600'} text-sm">${tData.rata_rata}</b></span>

                    }
                    
                    juzCards += `

                                ${statusBadge}

                            ${pagesHtml}

        window.buildPDFHtml = function(sis, dataSetoran, dataTasmi, type, isLast, filterWaktuStr) {
            const kelasObj = maps.kelas[sis.id_kelas];
            const unitObj = kelasObj ? maps.unit[kelasObj.id_unit] : null;
            const namaSekolahDyn = (unitObj && unitObj.nama_sekolah_unit) ? unitObj.nama_sekolah_unit : (window.getSetting('nama_sekolah') || '-');
            const namaKepsekDyn = (unitObj && unitObj.nama_kepsek) ? unitObj.nama_kepsek : '-';
            const nipKepsekDyn = (unitObj && unitObj.nip_kepsek) ? unitObj.nip_kepsek : '';
            const urlLogo = window.getSetting('url_logo');
            const nipHtml = (nipKepsekDyn && nipKepsekDyn.trim() !== '' && nipKepsekDyn.trim() !== '-') ? `<p style="margin-top: 2px; font-weight: normal;">NIP. ${nipKepsekDyn}</p>` : '';
            
            let zC = 0, zH = 0, mC = 0, mH = 0, tC = 0, tH = 0, ttC = 0, ttH = 0;
            let rekapData = {};
            
            dataSetoran.forEach(d => {
                const h = parseFloat(d.jml_halaman || 0);
                ttH += h; ttC++;
                if(!rekapData[d.kategori]) rekapData[d.kategori] = { count: 0, hal: 0 };
                rekapData[d.kategori].count++; rekapData[d.kategori].hal += h;
                
                if (d.kategori === 'Ziyadah') { zC++; zH += h; }
                else if (d.kategori === 'Murojaah') { mC++; mH += h; }
                else if (d.kategori.includes('Tahsin')) { tC++; tH += h; }
            });

            let lulusCount = 0, sedangCount = 0;
            dataTasmi.forEach(t => {
                if(t.status === 'Lulus') lulusCount++;
                else if(t.status === 'Sedang Ujian') sedangCount++;
            });

            let tasmiHtml = '';
            for (let col = 0; col < 3; col++) {
                tasmiHtml += `<table style="flex: 1; border-collapse: collapse; border: 1px solid #000; font-size: 10px; text-align: center; color: #000;">
                    <tr style="background: #e5e7eb;">
                        <th style="border: 1px solid #000; padding: 4px; font-weight: bold;">Juz</th>
                        <th style="border: 1px solid #000; padding: 4px; font-weight: bold;">Nilai</th>
                        <th style="border: 1px solid #000; padding: 4px; font-weight: bold;">Status</th>
                    </tr>`;
                for (let j = 1; j <= 10; j++) {
                    let juzNum = col * 10 + j;
                    let tData = dataTasmi.find(t => parseInt(t.juz) === juzNum);
                    let rata = tData ? tData.rata_rata : '-';
                    let status = tData ? tData.status : 'Belum';
                    let statusColor = '';
                    
                    if (status === 'Lulus') statusColor = 'color: #10b981; font-weight: bold;';
                    else if (status === 'Sedang Ujian') { status = 'Sedang'; statusColor = 'color: #f59e0b; font-weight: bold;'; }
                    else if (status === 'Belum Lulus') { status = 'Gagal'; statusColor = 'color: #ef4444; font-weight: bold;'; }
                    else statusColor = 'color: #9ca3af;';

                    tasmiHtml += `<tr>
                        <td style="border: 1px solid #000; padding: 4px; font-weight: bold; background: #f9fafb;">${juzNum}</td>
                        <td style="border: 1px solid #000; padding: 4px;">${rata}</td>
                        <td style="border: 1px solid #000; padding: 4px; ${statusColor}">${status}</td>
                    </tr>`;
                }
                tasmiHtml += `</table>`;
            }

            let mainContent = '';
            if (type === 'individu') {
                let rows = '';
                dataSetoran.forEach((d, i) => {
                    let m = '';
                    try {
                        const dt = JSON.parse(d.detail_materi);
                        if (d.kategori.includes('Ali')) m = `${dt.jilid} Hal ${dt.hal_awal}-${dt.hal_akhir}`;
                        else if (d.kategori.includes('Tahsin')) m = dt.juz ? `Juz ${dt.juz}` : '-';
                        else m = dt.juz ? `Juz ${dt.juz}, ${dt.surat} (Ayat ${dt.ayat_awal}-${dt.ayat_akhir})` : `${dt.jilid}`;
                    } catch(e){}
                    rows += `<tr>
                        <td style="border: 1px solid #000; padding: 6px; font-weight: 500;">${i+1}</td>
                        <td style="border: 1px solid #000; padding: 6px; font-weight: 500;">${d.tgl.split('-').reverse().join('-')}</td>
                        <td style="border: 1px solid #000; padding: 6px; font-weight: 500;">${d.kategori}</td>
                        <td style="border: 1px solid #000; padding: 6px; text-align: left; font-weight: 500;">${m}</td>
                        <td style="border: 1px solid #000; padding: 6px; font-weight: bold;">${d.predikat.split(' ')[0]}</td>
                    </tr>`;
                });
                if (dataSetoran.length === 0) rows = `<tr><td colspan="5" style="border: 1px solid #000; padding: 10px; font-weight: bold;">Belum ada data setoran.</td></tr>`;

                mainContent = `
                    <div style="margin-bottom: 15px;">
                        <h3 style="font-size: 12px; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; color: #000; border-bottom: 1px solid #000; padding-bottom: 4px;">Rincian Ujian Tasmi (Juz 1 - 30)</h3>
                        <div style="display: flex; gap: 8px;">${tasmiHtml}</div>

        window.loadSiswaLap = function(type) {

            sel.innerHTML = '<option value="">-- Pilih Siswa --</option>';

                filteredSiswa.forEach(s => {

        window.generateRaporLaporan = function(type) {
            const idVal = document.getElementById('lap_s').value; 
            const fW = document.getElementById('lap_p').value;
            
            if(!idVal) return Swal.fire('Oops','Silakan pilih filter kemudian pilih siswa atau opsi cetak semua','warning');
            
            let targetSiswa = [];
            if (idVal === 'semua') {
                if (currentRole === 'ortu') {
                    targetSiswa = (currentUser.anak||[]).filter(window.isSiswaAktif);
                } else {
                    const uId = document.getElementById('lap_u')?.value;
                    const kId = document.getElementById('lap_k')?.value;
                    const hId = document.getElementById('lap_h')?.value;
                    
                    targetSiswa = window.getAccessibleStudents().filter(window.isSiswaAktif);
                    if(uId) targetSiswa = targetSiswa.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);
                    if(kId) targetSiswa = targetSiswa.filter(s => s.id_kelas === kId);
                    if(hId) targetSiswa = targetSiswa.filter(s => s.id_halaqoh === hId || s.id_halaqoh_asrama === hId);
                }
            } else {
                targetSiswa = [window.getSiswaObj(idVal)];
            }

            if(targetSiswa.length === 0) return Swal.fire('Oops','Tidak ada data siswa yang ditemukan / Anda tidak memiliki akses untuk siswa tersebut','warning');
            if(targetSiswa.length > 40) return Swal.fire('Data Terlalu Besar', 'Maksimal cetak massal adalah 40 siswa per sesi agar PDF tidak blank.', 'warning');

            let finalHtml = `<div class="canvas-cetak" id="canvasCetak_${type}">`;

            targetSiswa.forEach((sis, index) => {
                let dRS = window.filterByWaktu((DB.setoran||[]).filter(s => s.id_siswa === sis.id), fW, 'tgl');
                let tSiswa = (DB.tasmi||[]).filter(t => t.id_siswa === sis.id);
                let isLast = index === targetSiswa.length - 1;
                
                finalHtml += window.buildPDFHtml(sis, dRS, tSiswa, type, isLast, fW);
            });
            
            finalHtml += `</div>
            <div class="mt-8 text-center no-print">
                <button onclick="window.cetakPDFRaporGlobal('${idVal === 'semua' ? 'Massal' : 'Individu'}', '${type}')" class="bg-emerald-600 hover:bg-emerald-700 transition text-white px-8 py-3 rounded shadow-lg font-bold"><i class="fas fa-file-pdf mr-2"></i> Export PDF ${type === 'individu' ? 'Rapor' : 'Rekap'} (${idVal === 'semua' ? 'Massal' : 'Individu'})</button>
            </div>`;

            const c = document.getElementById('raporContainer_' + type); 
            if(c) { 
                c.innerHTML = finalHtml; 
                c.classList.remove('hidden'); 
            }
        };

        window.cetakPDFRaporGlobal = function(tipe, reportType) {
            if (typeof html2pdf === 'undefined') {
                Swal.fire('Error', 'Modul cetak PDF belum selesai dimuat. Silakan muat ulang halaman.', 'error');
                return;
            }
            
            const el = document.getElementById('canvasCetak_' + reportType);
            if(!el) return Swal.fire('Oops', 'Elemen rapor tidak ditemukan.', 'error');

            const scaleValue = tipe === 'Massal' ? 1.5 : 2; 

            const opt = {
                margin: 0,
                filename: `Rapor_${reportType}_${tipe}_F4.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: scaleValue, useCORS: true, letterRendering: true, backgroundColor: '#ffffff', scrollY: 0 },
                jsPDF: { unit: 'mm', format: [215, 330], orientation: 'portrait' },
                pagebreak: { mode: 'css', avoid: 'tr' } 
            };
            
            window.showLoading(`Mencetak PDF ${reportType} ${tipe}... Mohon tunggu.`);
            
            try {
                html2pdf().set(opt).from(el).save().then(() => {
                    window.hideLoading();
                }).catch(err => {
                    window.hideLoading();
                    console.error("PDF Error: ", err);
                    Swal.fire('Gagal Cetak', 'Terjadi kesalahan saat memproses PDF. Pastikan URL Logo mendukung akses CORS.', 'error');
                });
            } catch(e) {
                window.hideLoading();
                Swal.fire('Error', 'Kesalahan internal pembuat PDF.', 'error');
            }
        };
