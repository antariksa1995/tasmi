            if(!sel) return;
            
            let filteredSiswa = (DB.siswa||[]).filter(s => window.canGuruAccessSiswa(s.id));
            if (uId) filteredSiswa = filteredSiswa.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);
            if (kId) filteredSiswa = filteredSiswa.filter(s => s.id_kelas === kId);

            sel.innerHTML = '<option value="">Semua Siswa</option>'; 
            filteredSiswa.forEach(s => {
                const stText = (s.status_siswa && s.status_siswa !== 'Aktif') ? `(${s.status_siswa})` : '';
                sel.innerHTML += `<option value="${s.id}">${s.nama_lengkap} ${stText}</option>`;
            });
            
            if(uId || kId) sel.classList.remove('bg-gray-50');
            else sel.classList.add('bg-gray-50');
        };

        window.renderTableLaporanSetoran = function() {
            let dta = (DB.setoran||[]).filter(s => window.canGuruAccessSiswa(s.id_siswa)); 
            
            const fWS = document.getElementById('fWS');
            if(fWS) dta = window.filterByWaktu(dta, fWS.value, 'tgl'); 
            
            const fUnit = document.getElementById('fUS')?.value;
            const fKelas = document.getElementById('fKS')?.value;
            const fSiswa = document.getElementById('fSS')?.value;
            const fKat = document.getElementById('fKatS')?.value;
            
            if(fUnit) dta = dta.filter(s => maps.kelas[window.getSiswaObj(s.id_siswa).id_kelas]?.id_unit === fUnit);
            if(fKelas) dta = dta.filter(s => window.getSiswaObj(s.id_siswa).id_kelas === fKelas);
            if(fSiswa) dta = dta.filter(s => s.id_siswa === fSiswa);
            if(fKat && fKat !== 'semua') dta = dta.filter(s => s.kategori === fKat);
            
            let h = `
                <table id="tableLaporanSetoran" class="dt-table text-sm whitespace-nowrap">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Siswa (Kelas)</th>
                            <th>Kategori</th>
                            <th>Materi</th>
                            <th>Jumlah Halaman</th>
                            <th>Predikat</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            dta.forEach(d => { 
                const sis = window.getSiswaObj(d.id_siswa); 
                let m = ''; 
                try { 
                    const dt = JSON.parse(d.detail_materi); 
                    if (d.kategori.includes('Ali')) { m = `${dt.jilid} Hal ${dt.hal_awal}-${dt.hal_akhir}`; } 
                    else if (d.kategori.includes('Tahsin')) { m = dt.juz ? `Juz ${dt.juz}` : '-'; } 
                    else { m = dt.juz ? `Juz ${dt.juz}, ${dt.surat} (Ayat ${dt.ayat_awal}-${dt.ayat_akhir})` : `${dt.jilid}`; }
                } catch(e) {} 
                
                let katBadge = d.kategori === 'Ziyadah' ? 'bg-blue-100 text-blue-800' : d.kategori === 'Murojaah' ? 'bg-yellow-100 text-yellow-800' : 'bg-purple-100 text-purple-800';

                h += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td>${d.tgl.split('-').reverse().join('-')}</td>
                        <td><b>${sis.nama_lengkap || 'Siswa Dihapus'}</b> <span class="text-xs text-gray-500 ml-1">(${window.getNamaKelas(sis.id_kelas)})</span></td>
                        <td><span class="${katBadge} text-xs px-2 py-0.5 rounded font-medium border border-gray-200">${d.kategori}</span></td>
                        <td class="text-gray-600">${m}</td>
                        <td>${d.jml_halaman || 0} Hal</td>
                        <td class="font-bold text-emerald-600">${d.predikat.split(' ')[0]}</td>
                    </tr>
                `; 
            });
            
            if(dta.length === 0) {
                h += `<tr><td colspan="6" class="text-center py-6 text-gray-500">Tidak ada data setoran yang cocok dengan filter</td></tr>`;
            }
            
            const lsCont = document.getElementById('lsCont');
            if(lsCont) lsCont.innerHTML = h + `</tbody></table>`;
        };

        window.exportExcel = function(tableId, fileName) {
            const table = document.getElementById(tableId);
            if (!table) return Swal.fire('Oops', 'Tabel tidak ditemukan', 'warning');
            
            window.showLoading("Memproses Excel...");
            setTimeout(() => {
                try {
                    const wb = XLSX.utils.table_to_book(table, {sheet: "Laporan"});
                    XLSX.writeFile(wb, `${fileName}_${new Date().toISOString().split('T')[0]}.xlsx`);
                    window.hideLoading();
                } catch(e) {
                    window.hideLoading();
                    Swal.fire('Error', 'Gagal memproses file Excel.', 'error');
                }
            }, 300);
        };

        // ====================================================================================
        // PENGATURAN
        // ====================================================================================
        window.renderPengaturan = function() {
            let html = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl">
                    <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-3"><i class="fas fa-cog text-emerald-600 mr-2"></i> Pengaturan Sistem</h2>
                    <form id="formSetting" onsubmit="window.saveSettings(event)" class="space-y-5">
            `;
            
            (DB.pengaturan||[]).filter(p => p.key_setting !== 'nama_kepsek' && p.key_setting !== 'nip_kepsek').forEach(p => {
                let displayLabel = p.key_setting.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                
                html += `
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">${displayLabel}</label>
                        <input type="text" id="set_${p.key_setting}" value="${p.value_setting}" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition shadow-sm">
                    </div>
                `;
            });
            
            html += `
                        <div class="pt-4 border-t border-gray-100 text-right">
                            <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-lg shadow font-bold transition"><i class="fas fa-save mr-1"></i> Simpan Pengaturan</button>
                        </div>
                    </form>
                </div>
            `;
            
            const ca = document.getElementById('contentArea'); 
            if(ca) ca.innerHTML = html;
        };
        
        window.saveSettings = async function(e) {
            e.preventDefault(); 
            window.showLoading("Menyimpan Pengaturan...");
            
            let hasChanges = false;
            for(let p of DB.pengaturan) {
                const el = document.getElementById(`set_${p.key_setting}`);
                if (el && el.value !== p.value_setting) {
                    hasChanges = true;
                    await window.fetchAPI('update', {sheet:'pengaturan', id: p.key_setting, data: {value_setting: el.value}});
                }
            }
            
            window.hideLoading(); 
            
            if(hasChanges) {
                Swal.fire('Berhasil', 'Pengaturan sistem berhasil disimpan', 'success'); 
                await window.initApp();
            } else {
                Swal.fire('Info', 'Tidak ada perubahan pengaturan yang disimpan', 'info');
            }
        };

        // ====================================================================================
        // INIT APLIKASI
        // ====================================================================================
        window.onload = async function() { 
            const cachedDB = localStorage.getItem('tasmi_db');
            if (cachedDB) {
                try {
                    DB = JSON.parse(cachedDB);
                    ['unit','kelas','halaqoh','guru'].forEach(k => { 
                        if(DB[k] && Array.isArray(DB[k])) DB[k].sort((a,b) => (a[`nama_${k==='guru'?'lengkap':k}`] || '').localeCompare(b[`nama_${k==='guru'?'lengkap':k}`] || '')); 
                    });

                    if (!DB.pengaturan || !Array.isArray(DB.pengaturan)) DB.pengaturan = [];
                    if (!DB.pengaturan.find(p => p.key_setting === 'url_logo')) DB.pengaturan.push({ key_setting: 'url_logo', value_setting: '' });
                    if (!DB.pengaturan.find(p => p.key_setting === 'nama_aplikasi')) DB.pengaturan.push({ key_setting: 'nama_aplikasi', value_setting: 'e-Tasmi' });
                    if (!DB.pengaturan.find(p => p.key_setting === 'nama_sistem_login')) DB.pengaturan.push({ key_setting: 'nama_sistem_login', value_setting: 'Sistem Akademik Tahfizh' });

                    window.buildMaps(); window.applySettingsToUI();
                } catch(e) { console.error("Cache read error:", e); }
            }

            const savedUser = localStorage.getItem('tasmi_user');
            const savedRole = localStorage.getItem('tasmi_role');
            
            if (savedUser && savedRole) {
                const ls = document.getElementById('loginScreen'); if(ls) ls.classList.add('hidden');
                
                try {
                    const parsedUser = JSON.parse(savedUser);
                    if (!DB.admin || !DB.guru) await window.initApp(true); 
                    
                    let isValid = false;
                    if (savedRole === 'admin' && (DB.admin||[]).find(x => x.username === parsedUser.username)) isValid = true;
                    if (savedRole === 'guru' && (DB.guru||[]).find(x => x.no_wa === parsedUser.no_wa)) isValid = true;
                    if (savedRole === 'ortu') {
                        const anak = (DB.siswa||[]).filter(s => s.no_wa_ortu === parsedUser.id);
                        if(anak.length > 0) { parsedUser.anak = anak; isValid = true; }
                    }
                    
                    if (isValid) {
                        window.setSession(parsedUser, savedRole); window.initApp(true);
                    } else {
                        window.logout(); Swal.fire('Sesi Berakhir', 'Sesi login telah kedaluwarsa atau diubah. Silakan login kembali.', 'info');
                    }
                } catch(e) { window.logout(); }
            } else {
                await window.initApp();
            }
        };
    </script>
</body>
</html>
