                                ${capaianHtml}
                                
                                <div style="margin-top: 15px; border: 1px solid #000; border-radius: 5px; overflow: hidden; font-size: 11px; text-align: center;">
                                    <div style="background: #e5e7eb; padding: 6px; font-weight: bold; border-bottom: 1px solid #000;">RINGKASAN TASMI</div>
                                    <div style="display: flex;">
                                        <div style="flex: 1; padding: 8px; border-right: 1px solid #000;">
                                            <div style="font-weight: bold; color: #10b981; font-size: 16px;">${lulusCount}</div>
                                            <div style="font-size: 9px; margin-top: 2px;">JUZ LULUS</div>
                                        </div>
                                        <div style="flex: 1; padding: 8px;">
                                            <div style="font-weight: bold; color: #f59e0b; font-size: 16px;">${sedangCount}</div>

                                        </div>

                                </div>

                            <div style="width: 65%;">
                                <h3 style="font-size: 13px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; color: #000; border-bottom: 1px solid #000; padding-bottom: 4px;">Rincian Ujian Tasmi (Juz 1 - 30)</h3>
                                <div style="display: flex; gap: 8px;">
                                    ${tasmiHtml}
                                </div>
                            </div>
                        </div>
                        
                        <div style="margin-top: 25px; display: flex; justify-content: space-between; text-align: center; font-size: 12px; color: #000; padding: 0 30px;">

                                <p style="margin-bottom: 70px; font-weight: 600;">Wali Kelas,</p>
                                <p style="font-weight: bold; text-decoration: underline;">${waliKelasName}</p>
                            </div>
                            <div style="width: 40%;">
                                <p style="margin-bottom: 70px; font-weight: 600;">Guru Halaqoh,</p>
                                <p style="font-weight: bold; text-decoration: underline;">${guruHalaqohName}</p>
                            </div>
                        </div>
                        <div style="margin-top: 15px; text-align: center; font-size: 12px; color: #000;">
                            <p style="margin-bottom: 5px; font-weight: 600;">${getSetting('lokasi_cetak')}, ${getSetting('tgl_cetak')}</p>
                            <p style="margin-bottom: 70px; font-weight: 600;">Kepala Sekolah,</p>
                            <p style="font-weight: bold; text-decoration: underline; margin-bottom: 0;">${namaKepsekDyn}</p>
                            ${nipHtml}
                        </div>
                    </div>
                `;
            });
            
            finalHtml += `</div>
            <div class="mt-8 text-center no-print">
                <button onclick="cetakPDFRaporCapaian('${idVal === 'semua' ? 'Massal' : 'Individu'}')" class="bg-blue-600 hover:bg-blue-700 transition text-white px-8 py-3 rounded shadow-lg font-bold"><i class="fas fa-file-pdf mr-2"></i> Export PDF Rekap (${idVal === 'semua' ? 'Massal' : 'Individu'})</button>
            </div>`;

            const c = document.getElementById('raporCapaianContainer'); 
            if(c) { c.innerHTML = finalHtml; c.classList.remove('hidden'); }
        }

        function cetakPDFRaporCapaian(tipe = 'Individu') {
            const el = document.getElementById('canvasCetakCapaian');
            const scaleValue = tipe === 'Massal' ? 1.5 : 2; 

            const opt = {
                margin: 0,
                filename: `Rekap_Capaian_${tipe}_F4.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: scaleValue, useCORS: true, letterRendering: true, backgroundColor: '#ffffff', scrollY: 0 },
                jsPDF: { unit: 'mm', format: [215, 330], orientation: 'portrait' },
                pagebreak: { mode: 'css', avoid: 'tr' } 
            };
            showLoading(`Mencetak PDF Rekap ${tipe}... Mohon tunggu.`);
            html2pdf().set(opt).from(el).save().then(() => hideLoading());
        }

        function exportExcel(tableId, fileName) {
            const table = document.getElementById(tableId);
            if (!table) return Swal.fire('Oops', 'Tabel tidak ditemukan', 'warning');
            
            showLoading("Memproses Excel...");
            setTimeout(() => {
                const wb = XLSX.utils.table_to_book(table, {sheet: "Laporan"});
                XLSX.writeFile(wb, `${fileName}_${new Date().toISOString().split('T')[0]}.xlsx`);
                hideLoading();
            }, 300);
        }

        function loadSiswaFilterLS() {
            const uId = document.getElementById('fUS')?.value;
            const kId = document.getElementById('fKS').value;
            const sel = document.getElementById('fSS');
            
            let filteredSiswa = (DB.siswa||[]).filter(s => canGuruAccessSiswa(s.id));
            if (uId) filteredSiswa = filteredSiswa.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);
            if (kId) filteredSiswa = filteredSiswa.filter(s => s.id_kelas === kId);

            sel.innerHTML = '<option value="">Semua Siswa</option>'; 
            filteredSiswa.forEach(s => {
                const stText = (s.status_siswa && s.status_siswa !== 'Aktif') ? `(${s.status_siswa})` : '';
                sel.innerHTML += `<option value="${s.id}">${s.nama_lengkap} ${stText}</option>`;
            });
            
            if(uId || kId) sel.classList.remove('bg-gray-50');
            else sel.classList.add('bg-gray-50');
        }

        function renderTableLaporanSetoran() {
            let dta = (DB.setoran||[]).filter(s => canGuruAccessSiswa(s.id_siswa)); 
            dta = filterByWaktu(dta, document.getElementById('fWS').value, 'tgl'); 
            
            const fUnit = document.getElementById('fUS')?.value;
            const fKelas = document.getElementById('fKS').value;
            const fSiswa = document.getElementById('fSS').value;
            const fKat = document.getElementById('fKatS').value;
            
            if(fUnit) dta = dta.filter(s => maps.kelas[getSiswaObj(s.id_siswa).id_kelas]?.id_unit === fUnit);
            if(fKelas) dta = dta.filter(s => getSiswaObj(s.id_siswa).id_kelas === fKelas);
            if(fSiswa) dta = dta.filter(s => s.id_siswa === fSiswa);
            if(fKat !== 'semua') dta = dta.filter(s => s.kategori === fKat);
            
            let h = `<table id="tableLaporanSetoran" class="dt-table text-sm whitespace-nowrap">
                <thead><tr><th>Tanggal</th><th>Siswa (Kelas)</th><th>Kategori</th><th>Materi</th><th>Jumlah Halaman</th><th>Predikat</th></tr></thead><tbody>`;
            
            dta.forEach(d => { 
                const sis = getSiswaObj(d.id_siswa); 
                let m = ''; 
                try { 
                    const dt = JSON.parse(d.detail_materi); 
                    if (d.kategori.includes('Ali')) { m = `${dt.jilid} Hal ${dt.hal_awal}-${dt.hal_akhir}`; } 
                    else if (d.kategori.includes('Tahsin')) { m = dt.juz ? `Juz ${dt.juz}` : '-'; } 
                    else { m = dt.juz ? `Juz ${dt.juz}, ${dt.surat} (Ayat ${dt.ayat_awal}-${dt.ayat_akhir})` : `${dt.jilid}`; }
                } catch(e) {} 
                
                let katBadge = d.kategori === 'Ziyadah' ? 'bg-blue-100 text-blue-800' : d.kategori === 'Murojaah' ? 'bg-yellow-100 text-yellow-800' : 'bg-purple-100 text-purple-800';

                h += `<tr>
                    <td>${d.tgl.split('-').reverse().join('-')}</td>
                    <td><b>${sis.nama_lengkap || 'Siswa Dihapus'}</b> <span class="text-xs text-gray-500 ml-1">(${getNamaKelas(sis.id_kelas)})</span></td>
                    <td><span class="${katBadge} text-xs px-2 py-0.5 rounded font-medium">${d.kategori}</span></td>
                    <td class="text-gray-600">${m}</td>
                    <td>${d.jml_halaman || 0} Hal</td>
                    <td class="font-bold text-emerald-600">${d.predikat.split(' ')[0]}</td>
                </tr>`; 
            });
            if(dta.length === 0) h += `<tr><td colspan="6" class="text-center py-6 text-gray-500">Tidak ada data setoran yang cocok dengan filter</td></tr>`;
            document.getElementById('lsCont').innerHTML = h + `</tbody></table>`;
        }

        function renderLeaderboard() {
            document.getElementById('contentArea').innerHTML = `<div class="bg-white p-5 border rounded-xl shadow-sm"><div class="flex justify-between items-center mb-4"><h2 class="text-lg font-bold text-yellow-600"><i class="fas fa-trophy"></i> Leaderboard Setoran ZM</h2></div>
            <div class="flex flex-wrap gap-2 mb-4 bg-gray-50 p-3 rounded-lg border">
                <select id="fWL" class="border rounded p-1.5 text-sm" onchange="renderTableL()"><option value="semua">Semua Waktu</option><option value="bulan_ini">Bulan Ini</option></select>
                <select id="fUL" class="border rounded p-1.5 text-sm" onchange="document.getElementById('fKL').innerHTML = buildKelasOptions(this.value, 'Semua Kelas'); renderTableL()"><option value="">Semua Unit</option>${getAvailableUnits().map(u=>`<option value="${u.id}">${u.nama_unit}</option>`).join('')}</select>
                <select id="fKL" class="border rounded p-1.5 text-sm" onchange="renderTableL()">${buildKelasOptions('', 'Semua Kelas')}</select>
                <select id="fAL" class="border rounded p-1.5 text-sm" onchange="renderTableL()"><option value="semua">Kategori ZM</option><option value="Ziyadah">Ziyadah</option><option value="Murojaah">Murojaah</option></select>
            </div><div id="ldTable" class="overflow-x-auto"></div></div>`;
            renderTableL();
        }

        function renderTableL() {
            let dataS = (DB.setoran||[]).filter(s => (s.kategori === 'Ziyadah' || s.kategori === 'Murojaah') && isSiswaAktif(getSiswaObj(s.id_siswa)) && canGuruAccessSiswa(s.id_siswa)); 
            dataS = filterByWaktu(dataS, document.getElementById('fWL').value, 'tgl'); 
            if(document.getElementById('fAL').value!=='semua') dataS = dataS.filter(s=>s.kategori===document.getElementById('fAL').value);
            
            const fUnit = document.getElementById('fUL')?.value;
            const fKelas = document.getElementById('fKL').value;

            let rMap = {}; 
            dataS.forEach(s => { 
                const sis = getSiswaObj(s.id_siswa); 
                if(fUnit && maps.kelas[sis.id_kelas]?.id_unit !== fUnit) return;
                if(fKelas && sis.id_kelas !== fKelas) return; 
                
                const k = s.id_siswa+'_'+s.kategori; 
                if(!rMap[k]) rMap[k] = { id_siswa: s.id_siswa, kat: s.kategori, count: 0, hal: 0 }; 
                rMap[k].count++; rMap[k].hal += parseFloat(s.jml_halaman||0); 
            });
            
            let rArr = Object.values(rMap); rArr.sort((a,b) => b.count - a.count || b.hal - a.hal);
            let h = `<table class="dt-table text-sm whitespace-nowrap"><thead><tr><th>Rank</th><th>Siswa (Kelas)</th><th>Kategori</th><th>Total Setoran</th><th>Total Halaman</th></tr></thead><tbody>`;
            rArr.forEach((r,i) => { const sis = getSiswaObj(r.id_siswa); h += `<tr><td class="text-center font-bold">${i+1}</td><td><b>${sis.nama_lengkap || 'Siswa Dihapus'}</b> <span class="text-xs text-gray-500">(${getNamaKelas(sis.id_kelas)})</span></td><td>${r.kat}</td><td class="font-bold text-center">${r.count} Kali</td><td class="text-center">${r.hal} Hal</td></tr>`; });
            document.getElementById('ldTable').innerHTML = h + `</tbody></table>`;
        }

        function renderLeaderboardTahsin() {
            document.getElementById('contentArea').innerHTML = `<div class="bg-white p-5 border rounded-xl shadow-sm"><div class="flex justify-between items-center mb-4"><h2 class="text-lg font-bold text-yellow-600"><i class="fas fa-medal"></i> Leaderboard Tahsin</h2></div>
            <div class="flex flex-wrap gap-2 mb-4 bg-gray-50 p-3 rounded-lg border">
                <select id="fWL" class="border rounded p-1.5 text-sm" onchange="renderTableLTahsin()"><option value="semua">Semua Waktu</option><option value="bulan_ini">Bulan Ini</option></select>
                <select id="fUT" class="border rounded p-1.5 text-sm" onchange="document.getElementById('fKL').innerHTML = buildKelasOptions(this.value, 'Semua Kelas'); renderTableLTahsin()"><option value="">Semua Unit</option>${getAvailableUnits().map(u=>`<option value="${u.id}">${u.nama_unit}</option>`).join('')}</select>
                <select id="fKL" class="border rounded p-1.5 text-sm" onchange="renderTableLTahsin()">${buildKelasOptions('', 'Semua Kelas')}</select>
                <select id="fAL" class="border rounded p-1.5 text-sm" onchange="renderTableLTahsin()"><option value="semua">Kategori Tahsin</option><option value="Tahsin Al-Quran">Al-Quran</option><option value="Tahsin Metode Ali">Metode Ali</option></select>
            </div><div id="ldTTable" class="overflow-x-auto"></div></div>`;
            renderTableLTahsin();
        }

            rArr.forEach((r,i) => { const sis = getSiswaObj(r.id_siswa); h += `<tr><td class="text-center font-bold">${i+1}</td><td><b>${sis.nama_lengkap || 'Siswa Dihapus'}</b> <span class="text-xs text-gray-500">(${getNamaKelas(sis.id_kelas)})</span></td><td>${r.kat}</td><td class="font-bold text-center">${r.count} Kali</td><td class="text-center">${r.hal} Hal</td></tr>`; });

        window.onload = async () => { 
            const cachedDB = localStorage.getItem('tasmi_db');
            if (cachedDB) {
                try {
                    DB = JSON.parse(cachedDB);
                    if(DB.unit) DB.unit.sort((a,b) => (a.nama_unit || '').localeCompare(b.nama_unit || ''));
                    if(DB.kelas) DB.kelas.sort((a,b) => (a.nama_kelas || '').localeCompare(b.nama_kelas || ''));
                    if(DB.halaqoh) DB.halaqoh.sort((a,b) => (a.nama_halaqoh || '').localeCompare(b.nama_halaqoh || ''));
                    if(DB.guru) DB.guru.sort((a,b) => (a.nama_lengkap || '').localeCompare(b.nama_lengkap || ''));

                    if (!DB.pengaturan) DB.pengaturan = [];
                    if (!DB.pengaturan.find(p => p.key_setting === 'url_logo')) DB.pengaturan.push({ key_setting: 'url_logo', value_setting: '' });
                    if (!DB.pengaturan.find(p => p.key_setting === 'nama_aplikasi')) DB.pengaturan.push({ key_setting: 'nama_aplikasi', value_setting: 'e-Tasmi' });
                    if (!DB.pengaturan.find(p => p.key_setting === 'nama_sistem_login')) DB.pengaturan.push({ key_setting: 'nama_sistem_login', value_setting: 'Sistem Akademik Tahfizh' });
                    
                    buildMaps(); applySettingsToUI();
                } catch(e) {}
            }

            const savedUser = localStorage.getItem('tasmi_user');
            const savedRole = localStorage.getItem('tasmi_role');
            
            if (savedUser && savedRole) {
                document.getElementById('loginScreen')?.classList.add('hidden');
                
                try {
                    const parsedUser = JSON.parse(savedUser);
                    if (!DB.admin || !DB.guru) await initApp(true); 
                    
                    let isValid = false;
                    if (savedRole === 'admin' && (DB.admin||[]).find(x => x.username === parsedUser.username)) isValid = true;
                    if (savedRole === 'guru' && (DB.guru||[]).find(x => x.no_wa === parsedUser.no_wa)) isValid = true;
                    if (savedRole === 'ortu') {
                        const anak = (DB.siswa||[]).filter(s => s.no_wa_ortu === parsedUser.id);
                        if(anak.length > 0) { parsedUser.anak = anak; isValid = true; }
                    }
                    
                    if (isValid) {
                        setSession(parsedUser, savedRole); initApp(true);
                    } else {
                        logout(); Swal.fire('Sesi Berakhir', 'Data akun tidak ditemukan atau telah diubah.', 'info');
                    }
                } catch(e) {
                    logout();
                }
            } else {
                await initApp();
            }
        };
    </script>
