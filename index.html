                <button onclick="closeModal()" class="px-4 py-2 text-gray-600 bg-gray-200 hover:bg-gray-300 rounded">Batal</button>

    <script>
        let currentUser = null; 
        let currentRole = null; 
        let DB = {}; 
        let maps = {}; 
        let progressChartInstance = null;

        const showLoading = (text = "Memuat...") => { document.getElementById('loadingText').innerText = text; document.getElementById('loadingScreen').classList.remove('hidden'); };
        const hideLoading = () => document.getElementById('loadingScreen').classList.add('hidden');
        const toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('sidebarBackdrop').classList.toggle('hidden'); };
        
        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('loginPassword');
            const pwdIcon = document.getElementById('togglePasswordIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                pwdIcon.classList.remove('fa-eye');
                pwdIcon.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                pwdIcon.classList.remove('fa-eye-slash');
                pwdIcon.classList.add('fa-eye');
            }
        }

        const formatDateToDDMMYYYY = (dateString) => {
            if (!dateString) return '';
            let d = String(dateString).split('T')[0];
            if (d.includes('-')) {
                let p = d.split('-');
                if (p.length === 3) {
                    if (p[0].length <= 2) return p[0] + p[1] + p[2];
                    return p[2] + p[1] + p[0]; 
                }
            }
            return d.replace(/-/g, '');
        };

        const generateId = () => 'ID_' + Math.random().toString(36).substr(2, 9);
        const getSetting = (key) => { const s = DB.pengaturan?.find(x => x.key_setting === key); return s ? s.value_setting : ''; };
        const isSiswaAktif = (s) => !s.status_siswa || s.status_siswa === 'Aktif';

        const getAvailableUnits = () => {
            if (currentRole === 'guru') {
                const myUnits = currentUser.id_unit_multi ? String(currentUser.id_unit_multi).split(',') : [];
                return (DB.unit || []).filter(u => myUnits.includes(u.id));
            }
            return DB.unit || [];
        };

        const canGuruAccessSiswa = (siswaId) => {
            if (currentRole === 'admin' || currentRole === 'ortu') return true;
            if (currentRole === 'guru') {
                const myUnits = currentUser.id_unit_multi ? String(currentUser.id_unit_multi).split(',') : [];
                const sis = maps.siswa[siswaId];
                if (!sis) return false;
                const unitId = maps.kelas[sis.id_kelas]?.id_unit;
                return myUnits.includes(unitId);
            }
            return true;
        };

        const canGuruAccessLaporanSiswa = (siswaId) => {
            if (currentRole === 'admin' || currentRole === 'ortu') return true;
            if (currentRole === 'guru') {
                const sis = maps.siswa[siswaId];
                if (!sis) return false;
                const isWali = maps.kelas[sis.id_kelas]?.id_wali_kelas === currentUser.id;
                const isGuruHal = maps.halaqoh[sis.id_halaqoh]?.id_guru_utama === currentUser.id || maps.halaqoh[sis.id_halaqoh]?.id_guru_pendamping === currentUser.id;
                const isGuruHalAsr = sis.id_halaqoh_asrama && (maps.halaqoh[sis.id_halaqoh_asrama]?.id_guru_utama === currentUser.id || maps.halaqoh[sis.id_halaqoh_asrama]?.id_guru_pendamping === currentUser.id);
                return isWali || isGuruHal || isGuruHalAsr;
            }
            return true;
        };

        const hasLaporanAccess = () => {
            if (currentRole === 'admin' || currentRole === 'ortu') return true;
            if (currentRole === 'guru') {
                const isWali = (DB.kelas||[]).some(k => k.id_wali_kelas === currentUser.id);
                const isGuruHal = (DB.halaqoh||[]).some(h => h.id_guru_utama === currentUser.id || h.id_guru_pendamping === currentUser.id);
                return isWali || isGuruHal;
            }
            return false;
        };

        const getAccessibleStudents = () => {
            if(currentRole === 'ortu') return currentUser.anak || [];
            if(currentRole === 'admin') return DB.siswa || [];
            return (DB.siswa || []).filter(s => canGuruAccessLaporanSiswa(s.id));
        };

        const buildKelasOptions = (unitId, defaultText = "Semua Kelas") => {
            let arr = DB.kelas || [];
            if (unitId) {
                arr = arr.filter(k => k.id_unit === unitId);
            } else if (currentRole === 'guru') {
                const myUnits = currentUser.id_unit_multi ? String(currentUser.id_unit_multi).split(',') : [];
                arr = arr.filter(k => myUnits.includes(k.id_unit));
            }
            return `<option value="">${defaultText}</option>` + arr.map(k=>`<option value="${k.id}">${k.nama_kelas}</option>`).join('');
        };

        function applySettingsToUI() {
            const appName = getSetting('nama_aplikasi') || 'e-Tasmi';
            const el = document.getElementById('appNameDisplay');
            if (el) el.innerText = appName;
            document.title = appName + ' - Sistem Tahfizh';

            const loginTitle = getSetting('nama_sistem_login') || 'Sistem Akademik Tahfizh';
            const elLoginTitle = document.getElementById('loginTitleDisplay');
            if (elLoginTitle) elLoginTitle.innerText = loginTitle;
        }

        async function fetchAPI(action, payload = {}) {
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, ...payload })
                });
                return await res.json();
            } catch (err) {
                return { success: false, message: 'Koneksi gagal. Pastikan URL Google Apps Script Anda valid.' };
            }
        }

        async function initApp(silent = false) {
            const btnRefresh = document.getElementById('btnRefreshGlobal');
            
            if (silent) {
                if(btnRefresh) btnRefresh.classList.add('animate-spin', 'text-emerald-500');
            } else {
                showLoading("Sinkronisasi Data...");
            }

            const res = await fetchAPI('getAllData');
            
            if (silent) {
                if(btnRefresh) btnRefresh.classList.remove('animate-spin', 'text-emerald-500');
            } else {
                hideLoading();
            }

            if (res.success && res.data) {
                try {
                    DB = res.data;
                    
                    if(DB.unit && Array.isArray(DB.unit)) DB.unit.sort((a,b) => (a.nama_unit || '').localeCompare(b.nama_unit || ''));
                    if(DB.kelas && Array.isArray(DB.kelas)) DB.kelas.sort((a,b) => (a.nama_kelas || '').localeCompare(b.nama_kelas || ''));
                    if(DB.halaqoh && Array.isArray(DB.halaqoh)) DB.halaqoh.sort((a,b) => (a.nama_halaqoh || '').localeCompare(b.nama_halaqoh || ''));
                    if(DB.guru && Array.isArray(DB.guru)) DB.guru.sort((a,b) => (a.nama_lengkap || '').localeCompare(b.nama_lengkap || ''));

                    if (!DB.pengaturan || !Array.isArray(DB.pengaturan)) DB.pengaturan = [];
                    if (!DB.pengaturan.find(p => p.key_setting === 'url_logo')) DB.pengaturan.push({ key_setting: 'url_logo', value_setting: '' });
                    if (!DB.pengaturan.find(p => p.key_setting === 'nama_aplikasi')) DB.pengaturan.push({ key_setting: 'nama_aplikasi', value_setting: 'e-Tasmi' });
                    if (!DB.pengaturan.find(p => p.key_setting === 'nama_sistem_login')) DB.pengaturan.push({ key_setting: 'nama_sistem_login', value_setting: 'Sistem Akademik Tahfizh' });

                    localStorage.setItem('tasmi_db', JSON.stringify(DB)); 
                    buildMaps();
                    applySettingsToUI();
                    
                    if(currentUser) {
                        if (currentRole === 'guru') {
                            const freshGuru = (DB.guru||[]).find(g => g.id === currentUser.id);
                            if (freshGuru) currentUser = freshGuru; 
                        } else if (currentRole === 'admin') {
                            const freshAdmin = (DB.admin||[]).find(a => a.id === currentUser.id);
                            if (freshAdmin) currentUser = freshAdmin;
                        } else if (currentRole === 'ortu') {
                            currentUser.anak = (DB.siswa||[]).filter(s => s.no_wa_ortu === currentUser.id);
                        }
                        
                        localStorage.setItem('tasmi_user', JSON.stringify(currentUser));
                        refreshSidebarMenu();

                        const pt = document.getElementById('pageTitle');
                        const currentPage = pt ? pt.innerText : '';
                        const activeMenu = MENUS.find(m => m.label === currentPage);
                        if(activeMenu && activeMenu.action) {
                            activeMenu.action();
                        }
                    }
                } catch(err) {
                    console.error("Kesalahan parsing data:", err);
                }
            } else if (!silent && !res.success) {
                Swal.fire('Error Database', res.message || 'Gagal mengambil data dari server.', 'error');
            }
        }

        function buildMaps() {
            maps.unit = {}; if(DB.unit) DB.unit.forEach(u => maps.unit[u.id] = u);
            maps.guru = {}; if(DB.guru) DB.guru.forEach(g => maps.guru[g.id] = g);
            maps.kelas = {}; if(DB.kelas) DB.kelas.forEach(k => maps.kelas[k.id] = k);
            maps.halaqoh = {}; if(DB.halaqoh) DB.halaqoh.forEach(h => maps.halaqoh[h.id] = h);
            maps.jabatan = {}; if(DB.jabatan) DB.jabatan.forEach(j => maps.jabatan[j.id] = j);
            maps.siswa = {}; if(DB.siswa) DB.siswa.forEach(s => maps.siswa[s.id] = s);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const user = String(document.getElementById('loginUsername').value).trim();
            const pass = String(document.getElementById('loginPassword').value).trim();
            
            showLoading("Verifikasi...");
            
            try {
                if (Object.keys(DB).length === 0 || !DB.admin || !DB.guru || !DB.siswa) {
                    await initApp(true); 
                }

                if (!DB || Object.keys(DB).length === 0 || !DB.admin) {
                    hideLoading();
                    Swal.fire('Koneksi Gagal', 'Sistem tidak dapat terhubung ke Database. Pastikan URL Google Apps Script sudah benar.', 'error');
                    return;
                }

                const matchWa = (dbWa, inputWa) => {
                    let a = String(dbWa || '').trim();
                    let b = String(inputWa || '').trim();
                    if (a.startsWith('8') && b.startsWith('08')) a = '0' + a; 
                    return a === b;
                };

                const admin = (DB.admin||[]).find(x => String(x.username).trim() === user && String(x.password).trim() === pass);
                if (admin) { setSession(admin, 'admin'); return; }

                const guru = (DB.guru||[]).find(x => matchWa(x.no_wa, user) && formatDateToDDMMYYYY(x.tgl_lahir) === pass);
                if (guru) { setSession(guru, 'guru'); return; }

                const siswaOrtu = (DB.siswa||[]).find(x => matchWa(x.no_wa_ortu, user) && formatDateToDDMMYYYY(x.tgl_lahir) === pass);
                if (siswaOrtu) { 
                    setSession({ id: user, nama: 'Ortu dari ' + siswaOrtu.nama_lengkap, anak: DB.siswa.filter(s => matchWa(s.no_wa_ortu, user)) }, 'ortu'); 
                    return; 
                }

                hideLoading();
                Swal.fire('Gagal Login', 'Username atau Password salah!', 'error');

            } catch(err) {
                console.error(err);
                hideLoading();
                Swal.fire('Sistem Error', 'Terjadi kesalahan sistem saat login: ' + err.message, 'error');
            }
        }

        function setSession(userData, role) {
            currentUser = userData;
            currentRole = role;
            
            localStorage.setItem('tasmi_user', JSON.stringify(userData));
            localStorage.setItem('tasmi_role', role);

            document.getElementById('loginScreen')?.classList.add('hidden');
            document.getElementById('appContainer')?.classList.remove('hidden');
            
            const dName = currentUser.nama || currentUser.nama_lengkap || currentUser.username || 'User';
            
            const ud = document.getElementById('userNameDisplay'); if(ud) ud.innerText = dName;
            const ur = document.getElementById('userRoleDisplay'); if(ur) ur.innerText = role.toUpperCase();
            const ui = document.getElementById('userInitial'); if(ui) ui.innerText = String(dName).charAt(0).toUpperCase();
            
            renderMenuAndDashboard();
            hideLoading();
        }

        function logout() {
            currentUser = null; currentRole = null;
            
            localStorage.removeItem('tasmi_user');
            localStorage.removeItem('tasmi_role');

            document.getElementById('appContainer')?.classList.add('hidden');
            document.getElementById('loginScreen')?.classList.remove('hidden');
            document.getElementById('loginForm')?.reset();
        }

        const MENUS = [
            { id: 'dashboard', label: 'Dashboard', icon: 'fa-home', roles: ['admin', 'guru'], action: renderDashboard },
            { label: 'LEADERBOARD', isHeader: true, roles: ['admin', 'guru'] },
            { id: 'lap_leaderboard', label: 'Leaderboard ZM', icon: 'fa-trophy', roles: ['admin', 'guru'], action: renderLeaderboard },
            { label: 'MASTER DATA', isHeader: true, roles: ['admin'] },
            { id: 'm_unit', label: 'Data Unit Sekolah', icon: 'fa-building', roles: ['admin'], action: () => renderCRUD('unit') },
            { id: 'm_jabatan', label: 'Data Jabatan', icon: 'fa-tags', roles: ['admin'], action: () => renderCRUD('jabatan') },
            { id: 'm_kelas', label: 'Data Kelas', icon: 'fa-school', roles: ['admin'], action: () => renderCRUD('kelas') },
            { id: 'm_halaqoh', label: 'Data Halaqoh', icon: 'fa-users', roles: ['admin'], action: () => renderCRUD('halaqoh') },

        function refreshSidebarMenu() {
            const container = document.getElementById('menuContainer');
            if(!container) return;
            container.innerHTML = '';
            
            const isPenguji = currentUser && (currentUser.is_penguji === true || String(currentUser.is_penguji).toLowerCase() === 'true' || currentUser.is_penguji === 1 || currentUser.is_penguji === '1');
            const isGuruTTQ = currentUser && (currentUser.is_guru_ttq === true || String(currentUser.is_guru_ttq).toLowerCase() === 'true' || currentUser.is_guru_ttq === 1 || currentUser.is_guru_ttq === '1');
            const hasLapAccess = hasLaporanAccess();

            MENUS.forEach(menu => {
                if (menu.roles.includes(currentRole)) {
                    if (menu.requirePenguji && currentRole === 'guru' && !isPenguji) return;
                    if (menu.requireTTQ && currentRole === 'guru' && !isGuruTTQ) return;
                    if (menu.requireLaporanAccess && currentRole === 'guru' && !hasLapAccess) return;

                    if (menu.isHeader) {
                        container.innerHTML += `<div class="text-xs font-bold text-emerald-300 mt-4 mb-1 px-2 uppercase tracking-wider">${menu.label}</div>`;
                    } else {
                        container.innerHTML += `<button onclick="navigate('${menu.id}')" id="menu-${menu.id}" class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-emerald-50 hover:bg-emerald-700 transition w-full text-left"><i class="fas ${menu.icon} w-5 text-center"></i> ${menu.label}</button>`;
                    }
                }
            });
            
            const pt = document.getElementById('pageTitle');
            const currentPage = pt ? pt.innerText : '';
            const activeMenu = MENUS.find(m => m.label === currentPage);
            if(activeMenu) {
                const btn = document.getElementById(`menu-${activeMenu.id}`);
                if(btn) btn.classList.add('bg-emerald-700', 'font-semibold');
            }

            if (currentRole === 'guru') {
                if (!isPenguji && (currentPage === 'Input Tasmi' || currentPage === 'Riwayat Ujian Tasmi')) {
                    Swal.fire('Akses Dicabut', 'Admin telah mencabut hak akses Anda sebagai Penguji Tasmi.', 'info');
                    navigate('dashboard');
                }
                if (!isGuruTTQ && (currentPage === 'Input Setoran' || currentPage === 'Riwayat Setoran')) {
                    Swal.fire('Akses Dicabut', 'Admin telah mencabut hak akses Anda sebagai Guru TTQ.', 'info');
                    navigate('dashboard');
                }
                if (!hasLapAccess && (currentPage === 'Laporan Rekap Capaian TTQ' || currentPage === 'Laporan Rekap Capaian')) {
                    Swal.fire('Akses Ditolak', 'Anda bukan lagi Wali Kelas atau Guru Halaqoh.', 'info');
                    navigate('dashboard');
                }
            }
        }

            refreshSidebarMenu();
            navigate(currentRole === 'ortu' ? 'lap_capaian' : 'dashboard');
        }

            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('bg-emerald-700', 'font-semibold'));
            const btn = document.getElementById(`menu-${id}`);
            if(btn) btn.classList.add('bg-emerald-700', 'font-semibold');
            const menu = MENUS.find(m => m.id === id);
            if(menu) {
                const pt = document.getElementById('pageTitle'); if(pt) pt.innerText = menu.label;
                const ca = document.getElementById('contentArea'); if(ca) ca.innerHTML = '';
                menu.action();
            }

                document.getElementById('sidebar')?.classList.add('-translate-x-full');
                document.getElementById('sidebarBackdrop')?.classList.add('hidden');

        function renderCRUD(tableKey) {
            const schema = schemas[tableKey];
            let data = [...(DB[tableKey] || [])];
            
            let filterHtml = '';
            if (tableKey === 'guru') {
                const fKat = window.currentGuruFilter || '';
                const fUnit = window.currentGuruUnitFilter || '';
                
                filterHtml = `
                    <div class="flex flex-wrap gap-2 mb-4 bg-gray-50 p-3 rounded-lg border">
                        <select class="border rounded p-1.5 text-sm font-semibold text-emerald-800 outline-none focus:ring focus:ring-emerald-200" onchange="window.currentGuruUnitFilter = this.value; renderCRUD('guru')">
                            <option value="">Semua Unit</option>
                            ${(DB.unit||[]).map(u => `<option value="${u.id}" ${fUnit === u.id ? 'selected' : ''}>${u.nama_unit}</option>`).join('')}
                        </select>

                        <select class="border rounded p-1.5 text-sm font-semibold text-emerald-800 outline-none focus:ring focus:ring-emerald-200" onchange="window.currentGuruFilter = this.value; renderCRUD('guru')">
                            <option value="" ${fKat === '' ? 'selected' : ''}>Semua Kategori Guru</option>
                            <option value="ttq" ${fKat === 'ttq' ? 'selected' : ''}>Khusus Guru TTQ (Input Setoran)</option>
                            <option value="nonttq" ${fKat === 'nonttq' ? 'selected' : ''}>Guru Non-TTQ (Umum/Walas dll)</option>
                            <option value="tasmi" ${fKat === 'tasmi' ? 'selected' : ''}>Khusus Penguji Tasmi</option>
                        </select>
                    </div>
                `;

                if (fUnit) {
                    data = data.filter(g => {
                        const uids = (g.id_unit_multi || '').split(',');
                        return uids.includes(fUnit);
                    });
                }

                if (fKat === 'ttq') {
                    data = data.filter(g => g.is_guru_ttq === true || String(g.is_guru_ttq).toLowerCase() === 'true' || g.is_guru_ttq === 1 || g.is_guru_ttq === '1');
                } else if (fKat === 'nonttq') {
                    data = data.filter(g => !(g.is_guru_ttq === true || String(g.is_guru_ttq).toLowerCase() === 'true' || g.is_guru_ttq === 1 || g.is_guru_ttq === '1'));
                } else if (fKat === 'tasmi') {
                    data = data.filter(g => g.is_penguji === true || String(g.is_penguji).toLowerCase() === 'true' || g.is_penguji === 1 || g.is_penguji === '1');
                }

                data.sort((a, b) => (a.nama_lengkap || '').localeCompare(b.nama_lengkap || ''));
            }

            let html = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-gray-800">Data ${schema.title}</h2>
                        <button onclick="openForm('${tableKey}')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow text-sm font-medium"><i class="fas fa-plus"></i> Tambah</button>
                    </div>
                    ${filterHtml}
                    <div class="overflow-x-auto">
                        <table class="dt-table">
                            <thead><tr>
                                <th>No</th>
                                ${schema.fields.map(f => `<th>${f.label.split('(')[0]}</th>`).join('')}
                                <th class="text-right">Aksi</th>
                            </tr></thead>
                            <tbody>
                                ${data.length === 0 ? `<tr><td colspan="${schema.fields.length+2}" class="text-center py-4">Tidak ada data</td></tr>` : ''}
                                ${data.map((row, i) => `
                                    <tr>
                                        <td>${i+1}</td>
                                        ${schema.fields.map(f => {
                                            let val = row[f.name];
                                            if (f.name === 'id_wali_kelas' || f.name === 'id_guru_utama' || f.name === 'id_guru_pendamping') val = getNamaGuru(val);
                                            if (f.name === 'id_jabatan_multi') val = getJabatanGuru(val);
                                            if (f.name === 'id_unit') val = maps.unit[val] ? maps.unit[val].nama_unit : '-';
                                            if (f.name === 'id_unit_multi') {
                                                const uids = (val || '').split(',');
                                                val = uids.map(id => maps.unit[id] ? maps.unit[id].nama_unit : '').filter(Boolean).join(', ');
                                            }
                                            if (f.type === 'checkbox') {
                                                const isTrue = val === true || String(val).toLowerCase() === 'true' || val === 1 || val === '1';

                                            }
                                            if (f.type === 'date' && val) val = val.split('-').reverse().join('-');
                                            return `<td>${val || '-'}</td>`;

        function openForm(tableKey, id = null) {
            const schema = schemas[tableKey];
            const data = id ? DB[tableKey].find(x => x.id === id) : {};
            const mt = document.getElementById('modalTitle'); if(mt) mt.innerText = (id ? 'Edit ' : 'Tambah ') + schema.title;
            
            let formHtml = `<form id="dynamicForm" class="space-y-4"><input type="hidden" id="formId" value="${id || ''}">`;
            schema.fields.forEach(f => {
                let val = data[f.name] !== undefined ? data[f.name] : '';
                formHtml += `<div><label class="block text-sm font-medium text-gray-700 mb-1">${f.label}</label>`;
                
                if (f.type === 'select') {
                    formHtml += `<select id="field_${f.name}" ${f.required?'required':''} class="w-full border rounded p-2 focus:ring-emerald-500 focus:border-emerald-500">`;
                    formHtml += `<option value="">-- Pilih --</option>`;
                    f.options().forEach(opt => {
                        formHtml += `<option value="${opt.val}" ${val === opt.val ? 'selected' : ''}>${opt.text}</option>`;
                    });
                    formHtml += `</select>`;
                } else if (f.type === 'multi-select') {
                    const vals = val ? val.split(',') : [];
                    formHtml += `<select id="field_${f.name}" multiple ${f.required?'required':''} class="w-full border rounded p-2 focus:ring-emerald-500 focus:border-emerald-500 h-24">`;
                    f.options().forEach(opt => {
                        formHtml += `<option value="${opt.val}" ${vals.includes(opt.val) ? 'selected' : ''}>${opt.text}</option>`;
                    });
                    formHtml += `</select><p class="text-xs text-gray-500 mt-1">Tahan CTRL/CMD untuk pilih lebih dari satu.</p>`;
                } else if (f.type === 'checkbox') {
                    const isChecked = val === true || String(val).toLowerCase() === 'true' || val === 1 || val === '1';
                    formHtml += `<input type="checkbox" id="field_${f.name}" ${isChecked ? 'checked' : ''} class="w-5 h-5 text-emerald-600 rounded">`;
                } else {
                    formHtml += `<input type="${f.type}" id="field_${f.name}" value="${val}" ${f.required?'required':''} class="w-full border rounded p-2 focus:ring-emerald-500 focus:border-emerald-500">`;
                }
                if (f.note) formHtml += `<p class="text-xs text-gray-500 mt-1">* ${f.note}</p>`;
                formHtml += `</div>`;
            });
            formHtml += `</form>`;
            
            const mb = document.getElementById('modalBody'); if(mb) mb.innerHTML = formHtml;
            const bsm = document.getElementById('btnSaveModal'); if(bsm) bsm.onclick = () => saveForm(tableKey);
            document.getElementById('generalModal')?.classList.remove('hidden');
        }

        async function saveForm(tableKey) {
            const form = document.getElementById('dynamicForm');
            if(!form.checkValidity()) { form.reportValidity(); return; }
            
            const schema = schemas[tableKey];
            let payload = {};
            schema.fields.forEach(f => {
                const el = document.getElementById(`field_${f.name}`);
                if (f.type === 'multi-select') {
                    payload[f.name] = Array.from(el.selectedOptions).map(opt => opt.value).join(',');
                } else if (f.type === 'checkbox') {
                    payload[f.name] = el.checked;
                } else {
                    payload[f.name] = el.value;
                }
            });

            const id = document.getElementById('formId').value;
            showLoading("Menyimpan...");
            const res = await fetchAPI(id ? 'update' : 'insert', { sheet: tableKey, id, data: payload });
            hideLoading();
            
            if (res.success) {
                closeModal();
                Swal.fire('Berhasil', 'Data disimpan', 'success');
                await initApp(); 
                renderCRUD(tableKey);
            } else {
                Swal.fire('Error', res.message || 'Gagal menyimpan data.', 'error');
            }
        }

        async function deleteData(tableKey, id) {
            const conf = await Swal.fire({ title: 'Hapus Data?', text: "Data tidak bisa dikembalikan!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Ya, Hapus!' });
            if (conf.isConfirmed) {
                showLoading("Menghapus...");
                const res = await fetchAPI('delete', { sheet: tableKey, id });
                hideLoading();
                if (res.success) { await initApp(); renderCRUD(tableKey); }
            }
        }

        function closeModal() { document.getElementById('generalModal')?.classList.add('hidden'); }

        const filterByWaktu = (data, fWaktu, dateField = 'tgl') => {
            if(!fWaktu || fWaktu === 'semua') return data;
            const now = new Date();
            const currMonth = now.getMonth() + 1;
            const currYear = now.getFullYear();
            const currDate = now.toISOString().split('T')[0];
            return data.filter(d => {
                if(!d[dateField]) return false;
                if(fWaktu === 'hari_ini') return d[dateField] === currDate;
                if(fWaktu === 'bulan_ini') {
                    const parts = d[dateField].split('-');
                    return parts.length === 3 && parseInt(parts[1]) === currMonth && parseInt(parts[0]) === currYear;
                }
                return true;
            });
        };

            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">`;

                html += `<div class="bg-white p-5 rounded-xl shadow-sm border flex items-center gap-4"><div class="p-3 bg-blue-100 text-blue-600 rounded-lg text-xl"><i class="fas fa-users"></i></div><div><p class="text-sm text-gray-500">Total Siswa Aktif</p><h3 class="text-2xl font-bold">${(DB.siswa||[]).filter(isSiswaAktif).length}</h3></div></div>
                        <div class="bg-white p-5 rounded-xl shadow-sm border flex items-center gap-4"><div class="p-3 bg-green-100 text-green-600 rounded-lg text-xl"><i class="fas fa-chalkboard-user"></i></div><div><p class="text-sm text-gray-500">Total Guru</p><h3 class="text-2xl font-bold">${(DB.guru||[]).length}</h3></div></div>
                        <div class="bg-white p-5 rounded-xl shadow-sm border flex items-center gap-4"><div class="p-3 bg-purple-100 text-purple-600 rounded-lg text-xl"><i class="fas fa-book-open"></i></div><div><p class="text-sm text-gray-500">Setoran (Bulan ini)</p><h3 class="text-2xl font-bold">${filterByWaktu(DB.setoran||[], 'bulan_ini').length}</h3></div></div>

        function updateDashboardTop5() {
            const elZ = document.getElementById('dashFilterWaktuZ'); const fWaktuZ = elZ ? elZ.value : 'semua';
            const elM = document.getElementById('dashFilterWaktuM'); const fWaktuM = elM ? elM.value : 'semua';

            const buildTop5HTML = (kategori, filterWaktu) => {
                let dataKat = (DB.setoran||[]).filter(s => s.kategori === kategori && isSiswaAktif(getSiswaObj(s.id_siswa)) && canGuruAccessSiswa(s.id_siswa));
                dataKat = filterByWaktu(dataKat, filterWaktu, 'tgl');
                
                let rankMap = {};
                dataKat.forEach(s => {
                    if(!rankMap[s.id_siswa]) rankMap[s.id_siswa] = { count: 0, hal: 0 };
                    rankMap[s.id_siswa].count += 1;
                    rankMap[s.id_siswa].hal += parseFloat(s.jml_halaman || 0);
                });

                let rankArr = Object.keys(rankMap).map(id => ({ id_siswa: id, count: rankMap[id].count, hal: rankMap[id].hal }));
                rankArr.sort((a,b) => b.count - a.count || b.hal - a.hal);
                const top5 = rankArr.slice(0, 5);

                let html = `<table class="dt-table text-sm w-full whitespace-nowrap"><thead><tr><th>Rank</th><th>Nama Siswa (Kelas)</th><th>Jml Setoran</th><th>Jml Halaman</th></tr></thead><tbody>`;
                if(top5.length === 0) {
                    html += `<tr><td colspan="4" class="text-center py-4 text-gray-500">Belum ada data setoran.</td></tr>`;
                } else {
                    top5.forEach((r, i) => {
                        const sis = getSiswaObj(r.id_siswa);
                        let badge = i===0 ? '<i class="fas fa-trophy text-yellow-500 text-xl"></i>' : i===1 ? '<i class="fas fa-medal text-gray-400 text-lg"></i>' : i===2 ? '<i class="fas fa-medal text-amber-600 text-lg"></i>' : `<span class="font-bold text-gray-500 ml-1">${i+1}</span>`;
                        html += `<tr><td class="text-center w-12">${badge}</td><td><b>${sis.nama_lengkap || 'Siswa Dihapus'}</b> <span class="text-xs text-gray-500 ml-1">(${getNamaKelas(sis.id_kelas)})</span></td><td class="font-bold text-emerald-600 text-center">${r.count} Kali</td><td class="text-center">${r.hal} Hal</td></tr>`;
                    });
                }
                return html + `</tbody></table>`;
            };

            const zCont = document.getElementById('top5ZiyadahContainer'); if(zCont) zCont.innerHTML = buildTop5HTML('Ziyadah', fWaktuZ);
            const mCont = document.getElementById('top5MurojaahContainer'); if(mCont) mCont.innerHTML = buildTop5HTML('Murojaah', fWaktuM);

            let recent10 = [...(DB.setoran||[])].filter(s => canGuruAccessSiswa(s.id_siswa)).sort((a,b) => new Date(b.tgl + 'T' + (b.jam||'00:00')) - new Date(a.tgl + 'T' + (a.jam||'00:00'))).slice(0, 10);
            let riwayatHtml = `<table class="dt-table text-sm whitespace-nowrap"><thead><tr><th>Waktu</th><th>Nama Siswa (Kelas)</th><th>Kategori</th><th>Jml Halaman</th><th>Predikat</th>${currentRole !== 'guru' ? '<th>Penginput</th>' : ''}</tr></thead><tbody>`;
            if(recent10.length === 0) {
                riwayatHtml += `<tr><td colspan="${currentRole!=='guru'?6:5}" class="text-center py-4 text-gray-500">Belum ada riwayat setoran.</td></tr>`;

            riwayatHtml += `</tbody></table>`;

        function downloadFormatSiswa() {
            const wb = XLSX.utils.book_new();
            const wsData = [
                ["Nama Lengkap", "L/P (L/P)", "Tempat Lahir", "Tgl Lahir (YYYY-MM-DD)", "ID Kelas", "ID Halaqoh Sekolah", "ID Halaqoh Asrama", "Nama Ayah", "Nama Ibu", "No WA Ortu", "Alamat", "Status Siswa (Aktif/Lulus/Pindah)"],
                ["Siswa Contoh", "L", "Jakarta", "2010-01-01", DB.kelas[0]?.id || "K1", DB.halaqoh[0]?.id || "H1", "", "Nama Ayah", "Nama Ibu", "08123456789", "Jl. Contoh", "Aktif"]
            ];
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            ws['!cols'] = [{wch:20}, {wch:10}, {wch:15}, {wch:22}, {wch:15}, {wch:18}, {wch:18}, {wch:15}, {wch:15}, {wch:15}, {wch:25}, {wch:20}];
            XLSX.utils.book_append_sheet(wb, ws, "Template Siswa");

            const wsRefData = [["JENIS", "NAMA", "ID UNTUK DI COPY"]];
            (DB.kelas||[]).forEach(k => wsRefData.push(["Kelas", k.nama_kelas, k.id]));
            (DB.halaqoh||[]).forEach(h => wsRefData.push(["Halaqoh " + (h.kategori_halaqoh || 'Reguler'), h.nama_halaqoh, h.id]));
            const wsRef = XLSX.utils.aoa_to_sheet(wsRefData);
            wsRef['!cols'] = [{wch:15}, {wch:25}, {wch:20}];
            XLSX.utils.book_append_sheet(wb, wsRef, "Referensi ID");

            XLSX.writeFile(wb, "Format_Import_Siswa.xlsx");
        }

        async function prosesImportSiswa(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet, {raw: false});

                    if (json.length === 0) return Swal.fire('Error', 'File kosong atau format salah.', 'error');

                    showLoading("Mengimpor Data...");
                    let successCount = 0;
                    
                    for (let row of json) {
                        const payload = {
                            nama_lengkap: row["Nama Lengkap"], jk: row["L/P (L/P)"], tmp_lahir: row["Tempat Lahir"], tgl_lahir: row["Tgl Lahir (YYYY-MM-DD)"],
                            id_kelas: row["ID Kelas"], id_halaqoh: row["ID Halaqoh Sekolah"], id_halaqoh_asrama: row["ID Halaqoh Asrama"] || "",
                            nama_ayah: row["Nama Ayah"], nama_ibu: row["Nama Ibu"], no_wa_ortu: row["No WA Ortu"], alamat: row["Alamat"],
                            status_siswa: row["Status Siswa (Aktif/Lulus/Pindah)"] || "Aktif"
                        };
                        
                        if(payload.nama_lengkap && payload.tgl_lahir && payload.no_wa_ortu) {
                            const res = await fetchAPI('insert', { sheet: 'siswa', data: payload });
                            if(res.success) successCount++;
                        }
                    }
                    
                    const isi = document.getElementById('importSiswaInput'); if(isi) isi.value = ''; 
                    hideLoading();
                    Swal.fire('Selesai', `Berhasil mengimpor ${successCount} data siswa.`, 'success');
                    await initApp(); renderSiswa();
                } catch(err) {
                    hideLoading(); Swal.fire('Error', 'Gagal membaca file Excel.', 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function pindahMassal() {
            const ids = Array.from(document.querySelectorAll('.check-siswa:checked')).map(cb => cb.value);

            const statusAlumni = document.getElementById('massStatus').value;

            const halSekolah = document.getElementById('massHalaqoh').value;
            const halAsrama = document.getElementById('massHalaqohAsrama').value;
            
            if(!statusAlumni && !kelas && !halSekolah && !halAsrama) return Swal.fire('Oops', 'Pilih setidaknya salah satu tujuan update', 'warning');

            showLoading("Memproses Update Massal...");
            for(let id of ids) {
                let updateData = {};
                if(statusAlumni) updateData.status_siswa = statusAlumni;
                if(kelas) updateData.id_kelas = kelas;

                await fetchAPI('update', {sheet: 'siswa', id: id, data: updateData});
            }
            hideLoading();
            Swal.fire('Berhasil', 'Siswa berhasil diperbarui', 'success');
            await initApp(); renderSiswa();
        }

        function checkExistingTasmi() {
            const siswaId = document.getElementById('ts_siswa')?.value;
            const juz = parseInt(document.getElementById('ts_juz')?.value);
            if(!siswaId || !juz) { document.getElementById('formTasmiContainer')?.classList.add('hidden'); return; }
            
            const existing = (DB.tasmi||[]).find(t => t.id_siswa === siswaId && parseInt(t.juz) === juz);
            document.getElementById('ts_id').value = existing ? existing.id : '';
            
            let existingNilai = [];
            if(existing) { try { existingNilai = JSON.parse(existing.nilai_per_halaman); } catch(e){} }
            
            const maxHal = getJuzPages(juz);
            let html = '';
            for(let i=0; i<maxHal; i++) {
                const val = existingNilai[i] !== undefined ? existingNilai[i] : 0;
                html += `<div><label class="block text-xs font-medium text-gray-600 mb-1">Halaman ${i+1}</label><input type="number" min="0" max="100" class="inp-tasmi w-full border p-2 rounded text-center font-semibold focus:ring-yellow-500" oninput="calcTasmi()" value="${val}"></div>`;
            }
            const gnt = document.getElementById('gridNilaiTasmi'); if(gnt) gnt.innerHTML = html;
            document.getElementById('formTasmiContainer')?.classList.remove('hidden');
            calcTasmi();
        }

        function calcTasmi() {
            const inps = document.querySelectorAll('.inp-tasmi'); 
            let sum = 0; let b75 = false; let filled = 0; let total = inps.length;
            inps.forEach(inp => { 
                let v = parseFloat(inp.value) || 0; 
                if(v > 100) { inp.value = 100; v = 100; Swal.fire('Peringatan','Nilai max 100 per halaman','warning'); } 
                if(v > 0) { filled++; if(v < 75) b75 = true; } 
                sum += v; 
            });
            const rata = total > 0 ? (sum / total).toFixed(2) : 0; 
            const elRata = document.getElementById('ts_rata'); if(elRata) elRata.innerText = rata;
            const stEl = document.getElementById('ts_status');
            if(stEl) {
                if (filled < total) { stEl.innerText = "SEDANG UJIAN"; stEl.className = "ml-2 text-sm px-2 py-1 rounded bg-yellow-500 text-white"; } 
                else {
                    if(rata >= 75 && !b75) { stEl.innerText = "LULUS"; stEl.className = "ml-2 text-sm px-2 py-1 rounded bg-green-500 text-white"; }
                    else { stEl.innerText = "BELUM LULUS"; stEl.className = "ml-2 text-sm px-2 py-1 rounded bg-red-500 text-white"; }
                }
            }
        }

        async function simpanTasmi() {
            const sId = document.getElementById('ts_siswa').value;
            if(!sId) return Swal.fire('Oops','Pilih siswa dulu','warning');
            const inputs = document.querySelectorAll('.inp-tasmi');
            let nilaiArr = []; inputs.forEach(inp => nilaiArr.push(parseFloat(inp.value) || 0));
            
            const exId = document.getElementById('ts_id').value;
            let stText = document.getElementById('ts_status').innerText;
            let finalStatus = 'Lulus';

        function renderTableProgressTasmi() {
            const fUnit = document.getElementById('filterUnitPrTasmi')?.value;
            const fKelas = document.getElementById('filterKelasPrTasmi')?.value;
            
            let dataSiswa = (DB.siswa||[]).filter(s => isSiswaAktif(s) && canGuruAccessSiswa(s.id));
            if(fUnit) dataSiswa = dataSiswa.filter(s => maps.kelas[s.id_kelas]?.id_unit === fUnit);
            if(fKelas) dataSiswa = dataSiswa.filter(s => s.id_kelas === fKelas);

            const tasmiStatusMap = new Map();
            (DB.tasmi||[]).forEach(t => tasmiStatusMap.set(t.id_siswa + '_' + t.juz, t.status));

            const siswaLulusCount = {};
            dataSiswa.forEach(s => {
                let count = 0;
                for(let i=1; i<=30; i++) if(tasmiStatusMap.get(s.id + '_' + i) === 'Lulus') count++;
                siswaLulusCount[s.id] = count;
            });

            dataSiswa.sort((a, b) => {
                const diff = siswaLulusCount[b.id] - siswaLulusCount[a.id];
                if (diff === 0) return (a.nama_lengkap || '').localeCompare(b.nama_lengkap || '');
                return diff;
            });

            let chartLabels = [], dataLulusPerJuz = [], dataSedangPerJuz = [], dataBelumPerJuz = [];
            for (let i = 1; i <= 30; i++) {
                chartLabels.push('Juz ' + i);
                let countLulus = 0, countSedang = 0;
                dataSiswa.forEach(s => {
                    const status = tasmiStatusMap.get(s.id + '_' + i);
                    if (status === 'Lulus') countLulus++;
                    else if (status === 'Sedang Ujian') countSedang++;
                });
                dataLulusPerJuz.push(countLulus);
                dataSedangPerJuz.push(countSedang);
                dataBelumPerJuz.push(dataSiswa.length - countLulus - countSedang);
            }

            const canvasEl = document.getElementById('progressChartCanvas');
            if(canvasEl) {
                const ctx = canvasEl.getContext('2d');
                if (progressChartInstance) progressChartInstance.destroy();
                progressChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: chartLabels, datasets: [
                            { label: 'Lulus', data: dataLulusPerJuz, backgroundColor: '#10b981', borderRadius: 4 },
                            { label: 'Sedang Ujian', data: dataSedangPerJuz, backgroundColor: '#f59e0b', borderRadius: 4 },
                            { label: 'Belum', data: dataBelumPerJuz, backgroundColor: '#ef4444', borderRadius: 4 }
                    ]},
                    options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, ticks: { stepSize: 1 }, title: { display: true, text: 'Jumlah Siswa' } } } }
                });
            }

            let html = `
                <table class="dt-table text-sm text-center whitespace-nowrap">
                    <thead><tr>
                        <th class="text-left min-w-[200px] border-r">Nama Siswa</th>
                        <th class="px-2 text-xs font-bold text-emerald-700 bg-emerald-100 border-r" title="Jumlah Juz Lulus">Lulus</th>
                        <th class="px-2 text-xs font-bold text-amber-700 bg-amber-100 border-r" title="Jumlah Juz Sedang Ujian">Sedang</th>
                        <th class="px-2 text-xs font-bold text-red-700 bg-red-100 border-r" title="Jumlah Juz Belum Lulus">Belum</th>
                        ${Array.from({length:30},(_,i)=>`<th class="px-1 text-xs" title="Juz ${i+1}">${i+1}</th>`).join('')}
                    </tr></thead>
                    <tbody>
                        ${dataSiswa.map((s, index) => {
                            let tdJuz = '', lulusCount = 0, sedangCount = 0;
                            for(let i=1; i<=30; i++) {
                                const status = tasmiStatusMap.get(s.id + '_' + i);
                                if (status === 'Lulus') { lulusCount++; tdJuz += `<td class="p-1"><i class="fas fa-check-circle text-green-500" title="Lulus"></i></td>`; } 
                                else if (status === 'Sedang Ujian') { sedangCount++; tdJuz += `<td class="p-1"><i class="fas fa-hourglass-half text-amber-500" title="Sedang Ujian"></i></td>`; } 
                                else { tdJuz += `<td class="p-1"><span class="text-gray-300">-</span></td>`; }
                            }
                            let belumCount = 30 - lulusCount - sedangCount;
                            let badgeHtml = '';
                            if (lulusCount > 0 && index < 5) {
                                const rank = index + 1;
                                if(rank === 1) badgeHtml = '<i class="fas fa-trophy text-yellow-500 ml-1.5 text-lg" title="Peringkat 1 Tasmi"></i>';
                                else if(rank === 2) badgeHtml = '<i class="fas fa-medal text-gray-400 ml-1.5 text-base" title="Peringkat 2 Tasmi"></i>';
                                else if(rank === 3) badgeHtml = '<i class="fas fa-medal text-amber-600 ml-1.5 text-base" title="Peringkat 3 Tasmi"></i>';
                                else badgeHtml = `<span class="ml-1.5 bg-gradient-to-r from-emerald-100 to-emerald-200 text-emerald-800 text-[10px] px-2 py-0.5 rounded-md font-bold shadow-sm relative -top-0.5">Top ${rank}</span>`;
                            }
                            return `<tr>
                                <td class="text-left border-r whitespace-nowrap min-w-[200px]"><b>${s.nama_lengkap || 'Siswa Dihapus'}</b> ${badgeHtml}<br><span class="text-xs text-gray-400">${getNamaKelas(s.id_kelas)}</span></td>
                                <td class="font-bold text-emerald-700 bg-emerald-50 border-r text-base">${lulusCount}</td>
                                <td class="font-bold text-amber-700 bg-amber-50 border-r text-base">${sedangCount}</td>
                                <td class="font-bold text-red-700 bg-red-50 border-r text-base">${belumCount}</td>
                                ${tdJuz}
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>`;
            const prc = document.getElementById('prTasmiTableContainer'); if(prc) prc.innerHTML = html;
        }

        function showDetailTasmiSiswa() {
            const sId = document.getElementById('dtlSiswa')?.value;

            const uId = document.getElementById('dtlUnit')?.value;
            const content = document.getElementById('detailTasmiContent');
            if(!sId || !content) return;

            let targetSiswa = [];
            if (sId === 'semua') {
                if (currentRole === 'ortu') targetSiswa = currentUser.anak;
                else {
                    targetSiswa = (DB.siswa||[]).filter(s => canGuruAccessSiswa(s.id));
                    if(kId) targetSiswa = targetSiswa.filter(s => s.id_kelas === kId);
                    else if(uId) targetSiswa = targetSiswa.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);
                }
            } else {
                targetSiswa = [(DB.siswa||[]).find(x=>x.id===sId)].filter(s => canGuruAccessSiswa(s.id));
            }

            if(targetSiswa.length === 0) { content.innerHTML = '<div class="text-center py-4 text-gray-500">Tidak ada data.</div>'; return; }

            let finalHtml = `<div class="w-full bg-white">`;
            targetSiswa.forEach((sis, index) => {
                const tasmiSiswa = (DB.tasmi||[]).filter(t => t.id_siswa === sis.id);
                let lulusCount = 0, belumCount = 0, juzCards = '';
                
                for(let i=1; i<=30; i++) {
                    const tData = tasmiSiswa.find(t => parseInt(t.juz) === i);
                    let statusBadge = '<span class="px-2 py-0.5 bg-gray-200 text-gray-500 rounded text-xs font-semibold">Belum Ujian</span>';
                    let pagesHtml = '';
                    
                    if (tData) {
                        if (tData.status === 'Lulus') { statusBadge = '<span class="px-2 py-0.5 bg-green-100 text-green-700 rounded text-xs font-bold"><i class="fas fa-check"></i> Lulus</span>'; lulusCount++; } 
                        else if (tData.status === 'Sedang Ujian') { statusBadge = '<span class="px-2 py-0.5 bg-yellow-100 text-yellow-700 rounded text-xs font-bold">Sedang Ujian</span>'; } 
                        else { statusBadge = '<span class="px-2 py-0.5 bg-red-100 text-red-700 rounded text-xs font-bold">Belum Lulus</span>'; }
                        
                        let nls = []; try { nls = JSON.parse(tData.nilai_per_halaman); } catch(e){}
                        pagesHtml += `<div class="grid grid-cols-5 sm:grid-cols-10 gap-2 mt-4">`;
                        for(let p=0; p<getJuzPages(i); p++) {
                            const val = nls[p];
                            const valClass = val > 0 ? (val >= 75 ? 'bg-emerald-50 text-emerald-700 font-bold border-emerald-300' : 'bg-red-50 text-red-700 font-bold border-red-300') : 'bg-gray-100 text-gray-400 border-gray-200';
                            pagesHtml += `<div class="border rounded text-center py-1.5 flex flex-col justify-center ${valClass}"><span class="text-[10px] opacity-70 mb-0.5">Hal ${p+1}</span><span class="text-sm">${val > 0 ? val : '-'}</span></div>`;
                        }
                        pagesHtml += `</div><div class="mt-4 pt-3 border-t border-gray-100 text-xs flex justify-between items-center text-gray-600"><span>Penguji: <b>${getNamaGuru(tData.id_penguji)}</b></span><span class="bg-gray-100 px-2 py-1 rounded">Rata-rata: <b class="${tData.rata_rata >= 75 ? 'text-emerald-600' : 'text-red-600'} text-sm">${tData.rata_rata}</b></span></div>`;
                    } else {
                        pagesHtml = `<div class="flex items-center justify-center h-20 bg-gray-50 rounded mt-3 border border-dashed border-gray-200"><p class="text-xs text-gray-400 italic mb-0">Belum ada data</p></div>`;
                    }
                    juzCards += `<div class="border border-gray-200 rounded-xl p-4 shadow-sm bg-white hover:shadow-md transition"><div class="flex justify-between items-center border-b border-gray-100 pb-3"><h4 class="font-bold text-gray-800 text-lg m-0">Juz ${i}</h4>${statusBadge}</div>${pagesHtml}</div>`;
                }

                finalHtml += `
                    <div class="${index < targetSiswa.length - 1 ? 'border-b-4 border-dashed border-gray-300 mb-8 pb-8' : ''} pt-2">
                        <div class="flex flex-col lg:flex-row gap-6 mb-8">
                            <div class="bg-gradient-to-br from-emerald-800 to-emerald-900 text-white rounded-xl p-6 shadow-lg w-full lg:w-1/2 flex items-center gap-5">
                                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center text-3xl font-bold border-2 border-white/50 flex-shrink-0">${sis.nama_lengkap.charAt(0)}</div>
                                <div class="flex-1"><h3 class="text-xl font-bold mb-1">${sis.nama_lengkap}</h3><div class="text-emerald-100 text-sm flex gap-3"><span><i class="fas fa-school w-4"></i> ${getNamaKelas(sis.id_kelas)}</span></div></div>
                            </div>
                            <div class="flex gap-4 w-full lg:w-1/2">
                                <div class="flex-1 bg-white border border-emerald-200 rounded-xl p-4 shadow-md flex flex-col items-center justify-center text-center relative overflow-hidden"><div class="absolute top-0 left-0 w-full h-1 bg-emerald-500"></div><span class="text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Lulus</span><span class="text-4xl font-black text-emerald-600">${lulusCount} <span class="text-base">Juz</span></span></div>
                                <div class="flex-1 bg-white border border-red-200 rounded-xl p-4 shadow-md flex flex-col items-center justify-center text-center relative overflow-hidden"><div class="absolute top-0 left-0 w-full h-1 bg-red-500"></div><span class="text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Belum Lulus</span><span class="text-4xl font-black text-red-500">${30-lulusCount} <span class="text-base">Juz</span></span></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">${juzCards}</div>
                    </div>`;
            });
            content.innerHTML = finalHtml + `</div>`;
        }

        function renderPengaturan() {
            let html = `<div class="bg-white rounded-xl shadow-sm border p-5 max-w-2xl"><h2 class="text-lg font-bold mb-4">Pengaturan Sistem</h2><form id="formSetting" onsubmit="saveSettings(event)" class="space-y-4">`;
            (DB.pengaturan||[]).filter(p => p.key_setting !== 'nama_kepsek' && p.key_setting !== 'nip_kepsek').forEach(p => {
                html += `<div><label class="block text-sm font-medium text-gray-700 capitalize">${p.key_setting.replace(/_/g, ' ')}</label><input type="text" id="set_${p.key_setting}" value="${p.value_setting}" class="w-full border p-2 rounded focus:ring-emerald-500"></div>`;
            });
            html += `<button type="submit" class="bg-emerald-600 text-white px-4 py-2 rounded shadow">Simpan Pengaturan</button></form></div>`;
            const ca = document.getElementById('contentArea'); if(ca) ca.innerHTML = html;
        }
        
        async function saveSettings(e) {
            e.preventDefault(); showLoading("Menyimpan...");
            for(let p of DB.pengaturan) {
                const el = document.getElementById(`set_${p.key_setting}`);
                if (el && el.value !== p.value_setting) await fetchAPI('update', {sheet:'pengaturan', id: p.key_setting, data: {value_setting: el.value}});
            }
            hideLoading(); Swal.fire('Berhasil','Pengaturan disimpan','success'); await initApp();
        }

        function renderLaporanIndividu() {
            const optUnit = getAvailableUnits().map(u=>`<option value="${u.id}">${u.nama_unit}</option>`).join('');
            const optHalSekolah = (DB.halaqoh||[]).filter(h=>h.kategori_halaqoh !== 'Asrama').map(h=>`<option value="${h.id}">${h.nama_halaqoh}</option>`).join('');
            const optHalAsrama = (DB.halaqoh||[]).filter(h=>h.kategori_halaqoh === 'Asrama').map(h=>`<option value="${h.id}">${h.nama_halaqoh}</option>`).join('');
            let optHalaqoh = '';
            if(optHalSekolah) optHalaqoh += `<optgroup label="🏫 Reguler">${optHalSekolah}</optgroup>`;
            if(optHalAsrama) optHalaqoh += `<optgroup label="🏡 Asrama">${optHalAsrama}</optgroup>`;

            let fH = `<select id="lap_u" class="w-full md:w-auto border p-2 rounded" onchange="document.getElementById('lap_k').innerHTML = buildKelasOptions(this.value, '-- Pilih Kelas --'); loadSiswaLap()"><option value="">-- Pilih Unit --</option>${optUnit}</select>
                      <select id="lap_k" class="w-full md:w-auto border p-2 rounded" onchange="loadSiswaLap()">${buildKelasOptions('', '-- Pilih Kelas --')}</select>
                      <select id="lap_h" class="w-full md:w-auto border p-2 rounded" onchange="loadSiswaLap()"><option value="">-- Pilih Halaqoh --</option>${optHalaqoh}</select>
                      <select id="lap_s" class="w-full md:w-auto border p-2 rounded bg-gray-50"><option value="">-- Pilih Siswa --</option></select>`;
            
            document.getElementById('contentArea').innerHTML = `<div class="bg-white rounded-xl shadow-sm border p-5 mb-4 no-print"><h2 class="text-lg font-bold mb-4">Cetak Rapor Individu / Massal (Khusus Admin)</h2><div class="flex flex-wrap gap-2 mb-4">${fH}<select id="lap_p" class="w-full md:w-auto border p-2 rounded"><option value="semua">Semua Waktu</option><option value="bulan_ini">Bulan Ini</option></select><button onclick="generateRapor()" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded shadow font-bold transition"><i class="fas fa-search"></i> Tampilkan Rapor</button></div></div><div id="raporContainer" class="hidden"></div>`;
            loadSiswaLap();
        }
        
        function loadSiswaLap() { 
            const uId = document.getElementById('lap_u')?.value;
            const kId = document.getElementById('lap_k')?.value; 
            const hId = document.getElementById('lap_h')?.value; 
            const sel = document.getElementById('lap_s'); 
            
            let filteredSiswa = (DB.siswa||[]).filter(isSiswaAktif);
            if (uId) filteredSiswa = filteredSiswa.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);
            if (kId) filteredSiswa = filteredSiswa.filter(s => s.id_kelas === kId);
            if (hId) filteredSiswa = filteredSiswa.filter(s => s.id_halaqoh === hId || s.id_halaqoh_asrama === hId);

            sel.innerHTML = '<option value="">-- Pilih Siswa --</option>'; 
            if (uId || kId || hId) {
                if(filteredSiswa.length > 0) {
                    sel.innerHTML += '<option value="semua" class="font-bold text-emerald-700">-- Cetak Semua Sesuai Filter --</option>';
                }
                filteredSiswa.forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.nama_lengkap}</option>`;
                });
                sel.classList.remove('bg-gray-50'); 
            } else {
                sel.classList.add('bg-gray-50'); 
            }
            document.getElementById('raporContainer').classList.add('hidden');
        }

        function generateRapor() {
            const idVal = document.getElementById('lap_s').value; 
            const fW = document.getElementById('lap_p').value;
            if(!idVal) return Swal.fire('Oops','Silakan pilih filter (Kelas/Unit/Halaqoh) kemudian pilih siswa atau opsi cetak semua','warning');
            
            let targetSiswa = [];
            if (idVal === 'semua') {
                const uId = document.getElementById('lap_u')?.value;
                const kId = document.getElementById('lap_k')?.value;
                const hId = document.getElementById('lap_h')?.value;
                targetSiswa = (DB.siswa||[]).filter(isSiswaAktif);
                if(uId) targetSiswa = targetSiswa.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);
                if(kId) targetSiswa = targetSiswa.filter(s => s.id_kelas === kId);
                if(hId) targetSiswa = targetSiswa.filter(s => s.id_halaqoh === hId || s.id_halaqoh_asrama === hId);
            } else {
                targetSiswa = [getSiswaObj(idVal)];
            }

            if(targetSiswa.length === 0) return Swal.fire('Oops','Tidak ada data siswa yang ditemukan pada filter ini','warning');
            if(targetSiswa.length > 40) return Swal.fire('Data Terlalu Besar', 'Maksimal cetak massal adalah 40 siswa per sesi agar PDF tidak blank. Silakan pilih spesifik per Kelas atau per Halaqoh.', 'warning');

            let finalHtml = `<div class="canvas-cetak" id="canvasCetak">`;
            const urlLogo = getSetting('url_logo');

            targetSiswa.forEach((sis, index) => {
                let dRS = filterByWaktu((DB.setoran||[]).filter(s => s.id_siswa === sis.id), fW, 'tgl');
                let zC = 0, zH = 0, mC = 0, mH = 0, tC = 0, tH = 0, ttH = 0;
                dRS.forEach(d => { 
                    const h = parseFloat(d.jml_halaman||0); ttH += h; 
                    if(d.kategori === 'Ziyadah') { zC++; zH += h; } 
                    else if(d.kategori === 'Murojaah') { mC++; mH += h; } 
                    else if(d.kategori.includes('Tahsin')) { tC++; tH += h; } 
                });
                
                const waliKelasName = getWaliKelas(sis.id_kelas);
                const halaqohObj = (DB.halaqoh||[]).find(h => h.id === sis.id_halaqoh);
                const guruHalaqohName = halaqohObj ? getNamaGuru(halaqohObj.id_guru_utama) : '-';

                const kelasObj = maps.kelas[sis.id_kelas];
                const unitObj = kelasObj ? maps.unit[kelasObj.id_unit] : null;
                
                const namaSekolahDyn = (unitObj && unitObj.nama_sekolah_unit) ? unitObj.nama_sekolah_unit : (getSetting('nama_sekolah') || '-');
                const namaKepsekDyn = (unitObj && unitObj.nama_kepsek) ? unitObj.nama_kepsek : '-';
                const nipKepsekDyn = (unitObj && unitObj.nip_kepsek) ? unitObj.nip_kepsek : '';
                
                const nipHtml = (nipKepsekDyn && nipKepsekDyn.trim() !== '' && nipKepsekDyn.trim() !== '-') 
                    ? `<p style="margin-top: 2px; font-weight: normal;">NIP. ${nipKepsekDyn}</p>` 
                    : '';

                const pageBreakStyle = index < targetSiswa.length - 1 ? 'page-break-after: always; break-after: page;' : '';

                const tasmiSiswa = (DB.tasmi||[]).filter(t => t.id_siswa === sis.id);
                let tasmiHtml = '';
                for (let col = 0; col < 3; col++) {
                    tasmiHtml += `<table style="flex: 1; border-collapse: collapse; border: 1px solid #000; font-size: 10px; text-align: center; color: #000;">
                        <tr style="background: #e5e7eb;">
                            <th style="border: 1px solid #000; padding: 4px; font-weight: bold;">Juz</th>
                            <th style="border: 1px solid #000; padding: 4px; font-weight: bold;">Nilai</th>
                            <th style="border: 1px solid #000; padding: 4px; font-weight: bold;">Status</th>
                        </tr>`;
                    for (let j = 1; j <= 10; j++) {
                        let juzNum = col * 10 + j;
                        let tData = tasmiSiswa.find(t => parseInt(t.juz) === juzNum);
                        let rata = tData ? tData.rata_rata : '-';
                        let status = tData ? tData.status : 'Belum';
                        let statusColor = '';
                        
                        if (status === 'Lulus') statusColor = 'color: #10b981; font-weight: bold;';
                        else if (status === 'Sedang Ujian') { status = 'Sedang'; statusColor = 'color: #f59e0b; font-weight: bold;'; }
                        else if (status === 'Belum Lulus') { status = 'Gagal'; statusColor = 'color: #ef4444; font-weight: bold;'; }
                        else statusColor = 'color: #9ca3af;';

                        tasmiHtml += `<tr>

                            <td style="border: 1px solid #000; padding: 4px;">${rata}</td>
                            <td style="border: 1px solid #000; padding: 4px; ${statusColor}">${status}</td>

                    }
                    tasmiHtml += `</table>`;
                }

                finalHtml += `
                    <div style="width: 215mm; padding: 15mm 20mm 10mm 20mm; box-sizing: border-box; position: relative; overflow: hidden; ${pageBreakStyle}">
                        <div style="display: flex; align-items: center; border-bottom: 3px double #000; padding-bottom: 10px; margin-bottom: 20px;">
                            <div style="width: 80px; flex-shrink: 0;">
                                ${urlLogo ? `<img src="${urlLogo}" style="max-width: 100%; max-height: 80px; object-fit: contain;">` : ''}
                            </div>
                            <div style="flex-grow: 1; text-align: center; padding-right: ${urlLogo ? '80px' : '0'};">
                                <h1 style="font-size: 26px; font-weight: bold; text-transform: uppercase; margin: 0; color: #000;">${namaSekolahDyn}</h1>

                                <h2 style="font-size: 16px; font-weight: bold; margin-top: 10px; text-transform: uppercase; color: #000;">Laporan Rincian Setoran TTQ</h2>
                                <p style="font-size: 11px; color: #000; font-weight: bold; margin-top: 4px;">Periode: ${fW === 'bulan_ini' ? 'Bulan Ini' : 'Keseluruhan Waktu'}</p>

                            </tr>
                            <tr>
                                <td style="font-weight: bold;">TTL</td><td style="font-weight: 600;">: ${sis.tmp_lahir}, ${sis.tgl_lahir}</td>
                                <td style="font-weight: bold;">Wali Kelas</td><td style="font-weight: 600;">: ${waliKelasName}</td>
                            </tr>
                            <tr>
                                <td style="font-weight: bold;">Halaqoh</td><td style="font-weight: 600;">: ${getNamaHalaqoh(sis.id_halaqoh)}</td>
                                <td style="font-weight: bold;">Guru Halaqoh</td><td style="font-weight: 600;">: ${guruHalaqohName}</td>

                            <div style="display: flex; gap: 8px;">
                                ${tasmiHtml}

                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; text-align: center; color: #000;">
                            <div style="border: 1px solid #000; padding: 8px; border-radius: 5px;"><div style="font-size: 10px; font-weight: bold;">ZIYADAH</div><div style="font-weight: 600; margin-top: 4px;">${zC} Setoran</div><div style="font-weight: bold; font-size: 14px;">${zH} Hal</div></div>
                            <div style="border: 1px solid #000; padding: 8px; border-radius: 5px;"><div style="font-size: 10px; font-weight: bold;">MUROJAAH</div><div style="font-weight: 600; margin-top: 4px;">${mC} Setoran</div><div style="font-weight: bold; font-size: 14px;">${mH} Hal</div></div>
                            <div style="border: 1px solid #000; padding: 8px; border-radius: 5px;"><div style="font-size: 10px; font-weight: bold;">TAHSIN</div><div style="font-weight: 600; margin-top: 4px;">${tC} Setoran</div><div style="font-weight: bold; font-size: 14px;">${tH} Hal</div></div>
                            <div style="border: 1px solid #000; padding: 8px; border-radius: 5px; background: #f3f4f6;"><div style="font-size: 10px; font-weight: bold;">TOTAL KESELURUHAN</div><div style="font-size: 16px; font-weight: bold; margin-top: 6px;">${ttH} Hal</div></div>
                        </div>
                        <table style="width: 100%; border-collapse: collapse; border: 1px solid #000; font-size: 11px; text-align: center; color: #000;">
                            <tr style="background: #e5e7eb;">
                                <th style="border: 1px solid #000; padding: 8px; width: 30px; font-weight: bold;">No</th>
                                <th style="border: 1px solid #000; padding: 8px; width: 80px; font-weight: bold;">Tanggal</th>

                                let m = ''; 
                                try {

                                    else if (d.kategori.includes('Tahsin')) { m = dt.juz ? `Juz ${dt.juz}` : '-'; }

                                } catch(e){} 
                                return `<tr>
                                    <td style="border: 1px solid #000; padding: 6px; font-weight: 500;">${i+1}</td>
                                    <td style="border: 1px solid #000; padding: 6px; font-weight: 500;">${d.tgl.split('-').reverse().join('-')}</td>

                                    <td style="border: 1px solid #000; padding: 6px; font-weight: bold;">${d.predikat.split(' ')[0]}</td>

                            ${dRS.length === 0 ? `<tr><td colspan="5" style="border: 1px solid #000; padding: 10px; font-weight: bold;">Belum ada data setoran untuk periode ini.</td></tr>` : ''}

                        <div style="margin-top: 30px; display: flex; justify-content: space-between; text-align: center; font-size: 11px; color: #000; padding: 0 20px;">

                                <p style="margin-bottom: 60px; font-weight: 600;">Guru Halaqoh,</p>

            let fH = '';
            if (currentRole === 'ortu') {
                fH = `<select id="cap_s" class="w-full md:w-auto border p-2 rounded bg-gray-50"><option value="">-- Pilih Anak --</option><option value="semua">Semua Anak Saya</option>${(currentUser.anak||[]).filter(isSiswaAktif).map(a => `<option value="${a.id}">${a.nama_lengkap}</option>`).join('')}</select>`;
            } else {
                const optUnit = getAvailableUnits().map(u=>`<option value="${u.id}">${u.nama_unit}</option>`).join('');
                
                const accSiswa = getAccessibleStudents();
                const accHalIds = [...new Set(accSiswa.flatMap(s => [s.id_halaqoh, s.id_halaqoh_asrama]).filter(Boolean))];

                const halList = (DB.halaqoh||[]).filter(h => accHalIds.includes(h.id));
                const optHalSekolah = halList.filter(h=>h.kategori_halaqoh !== 'Asrama').map(h=>`<option value="${h.id}">${h.nama_halaqoh}</option>`).join('');
                const optHalAsrama = halList.filter(h=>h.kategori_halaqoh === 'Asrama').map(h=>`<option value="${h.id}">${h.nama_halaqoh}</option>`).join('');
                
                let optHalaqoh = '';
                if(optHalSekolah) optHalaqoh += `<optgroup label="🏫 Reguler">${optHalSekolah}</optgroup>`;
                if(optHalAsrama) optHalaqoh += `<optgroup label="🏡 Asrama">${optHalAsrama}</optgroup>`;

            document.getElementById('contentArea').innerHTML = `<div class="bg-white rounded-xl shadow-sm border p-5 mb-4 no-print"><h2 class="text-lg font-bold mb-4">Cetak Laporan Rekap Capaian</h2><div class="flex flex-wrap gap-2 mb-4">${fH}<select id="cap_p" class="w-full md:w-auto border p-2 rounded"><option value="semua">Semua Waktu</option><option value="bulan_ini">Bulan Ini</option></select><button onclick="generateRaporCapaian()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded shadow font-bold transition"><i class="fas fa-search"></i> Tampilkan Rekap</button></div></div><div id="raporCapaianContainer" class="hidden"></div>`;
            
            if(currentRole !== 'ortu') loadSiswaCap();
        }

        function loadSiswaCap() { 
            if (currentRole === 'ortu') return;
            const uId = document.getElementById('cap_u')?.value;
            const kId = document.getElementById('cap_k')?.value; 
            const hId = document.getElementById('cap_h')?.value; 
            const sel = document.getElementById('cap_s'); 
            
            let filteredSiswa = getAccessibleStudents().filter(isSiswaAktif);
            if (uId) filteredSiswa = filteredSiswa.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);
            if (kId) filteredSiswa = filteredSiswa.filter(s => s.id_kelas === kId);
            if (hId) filteredSiswa = filteredSiswa.filter(s => s.id_halaqoh === hId || s.id_halaqoh_asrama === hId);

            sel.innerHTML = '<option value="">-- Pilih Siswa --</option>'; 
            if (uId || kId || hId) {
                if(filteredSiswa.length > 0) {
                    sel.innerHTML += '<option value="semua" class="font-bold text-blue-700">-- Cetak Semua Sesuai Filter --</option>';
                }
                filteredSiswa.forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.nama_lengkap}</option>`;
                });
                sel.classList.remove('bg-gray-50'); 
            } else {
                sel.classList.add('bg-gray-50'); 
            }
            document.getElementById('raporCapaianContainer').classList.add('hidden');
        }

        function generateRaporCapaian() {
            const idVal = document.getElementById('cap_s').value; 
            const fW = document.getElementById('cap_p').value;
            
            if(!idVal) return Swal.fire('Oops','Silakan pilih filter (Kelas/Unit/Halaqoh) kemudian pilih siswa atau opsi cetak semua','warning');
            
            let targetSiswa = [];
            if (idVal === 'semua') {
                if (currentRole === 'ortu') {
                    targetSiswa = (currentUser.anak||[]).filter(isSiswaAktif);
                } else {
                    const uId = document.getElementById('cap_u')?.value;
                    const kId = document.getElementById('cap_k')?.value;
                    const hId = document.getElementById('cap_h')?.value;
                    
                    targetSiswa = getAccessibleStudents().filter(isSiswaAktif);
                    if(uId) targetSiswa = targetSiswa.filter(s => maps.kelas[s.id_kelas]?.id_unit === uId);
                    if(kId) targetSiswa = targetSiswa.filter(s => s.id_kelas === kId);
                    if(hId) targetSiswa = targetSiswa.filter(s => s.id_halaqoh === hId || s.id_halaqoh_asrama === hId);
                }

                targetSiswa = [getSiswaObj(idVal)].filter(s => currentRole === 'ortu' || canGuruAccessLaporanSiswa(s.id));

                            <th style="border: 1px solid #000; padding: 4px; font-weight: bold;">Juz</th>

                            <td style="border: 1px solid #000; padding: 4px; font-weight: bold; background: #f9fafb;">${juzNum}</td>

                    }
                    tasmiHtml += `</table>`;
                }

                finalHtml += `
                    <div style="width: 215mm; padding: 15mm 20mm 10mm 20mm; box-sizing: border-box; position: relative; overflow: hidden; ${pageBreakStyle}">
                        <div style="display: flex; align-items: center; border-bottom: 3px double #000; padding-bottom: 10px; margin-bottom: 20px;">
                            <div style="width: 80px; flex-shrink: 0;">
                                ${urlLogo ? `<img src="${urlLogo}" style="max-width: 100%; max-height: 80px; object-fit: contain;">` : ''}
                            </div>
                            <div style="flex-grow: 1; text-align: center; padding-right: ${urlLogo ? '80px' : '0'};">
                                <h1 style="font-size: 26px; font-weight: bold; text-transform: uppercase; margin: 0; color: #000;">${namaSekolahDyn}</h1>
                                <p style="margin: 3px 0; color: #000; font-weight: 600; font-size: 10px;">${getSetting('alamat')}</p>
                                <h2 style="font-size: 16px; font-weight: bold; margin-top: 10px; text-transform: uppercase; color: #000;">Laporan Rekapitulasi Capaian TTQ</h2>
                                <p style="font-size: 11px; color: #000; font-weight: bold; margin-top: 4px;">Periode: ${fW === 'bulan_ini' ? 'Bulan Ini' : 'Keseluruhan Waktu'}</p>
                            </div>
                        </div>
                        <table style="width: 100%; margin-bottom: 20px; color: #000; font-size: 12px;">
                            <tr>
                                <td style="width: 15%; font-weight: bold; padding-bottom: 4px;">Nama</td><td style="width: 35%; font-weight: 600; padding-bottom: 4px;">: ${sis.nama_lengkap || 'Siswa Dihapus'}</td>
                                <td style="width: 15%; font-weight: bold; padding-bottom: 4px;">Kelas</td><td style="font-weight: 600; padding-bottom: 4px;">: ${getNamaKelas(sis.id_kelas)}</td>
                            </tr>
                            <tr>
                                <td style="font-weight: bold; padding-bottom: 4px;">TTL</td><td style="font-weight: 600; padding-bottom: 4px;">: ${sis.tmp_lahir}, ${sis.tgl_lahir}</td>
                                <td style="font-weight: bold; padding-bottom: 4px;">Wali Kelas</td><td style="font-weight: 600; padding-bottom: 4px;">: ${waliKelasName}</td>
                            </tr>
                            <tr>
                                <td style="font-weight: bold;">Halaqoh</td><td style="font-weight: 600;">: ${getNamaHalaqoh(sis.id_halaqoh)}</td>
                                <td style="font-weight: bold;">Guru Halaqoh</td><td style="font-weight: 600;">: ${guruHalaqohName}</td>
                            </tr>
                        </table>
                        
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; text-align: center; color: #000;">
                            <div style="border: 1px solid #000; padding: 8px; border-radius: 5px;"><div style="font-size: 10px; font-weight: bold;">ZIYADAH</div><div style="font-weight: 600; margin-top: 4px;">${zC} Setoran</div><div style="font-weight: bold; font-size: 14px;">${zH} Hal</div></div>
                            <div style="border: 1px solid #000; padding: 8px; border-radius: 5px;"><div style="font-size: 10px; font-weight: bold;">MUROJAAH</div><div style="font-weight: 600; margin-top: 4px;">${mC} Setoran</div><div style="font-weight: bold; font-size: 14px;">${mH} Hal</div></div>
                            <div style="border: 1px solid #000; padding: 8px; border-radius: 5px;"><div style="font-size: 10px; font-weight: bold;">TAHSIN</div><div style="font-weight: 600; margin-top: 4px;">${tC} Setoran</div><div style="font-weight: bold; font-size: 14px;">${tH} Hal</div></div>
                            <div style="border: 1px solid #000; padding: 8px; border-radius: 5px; background: #f3f4f6;"><div style="font-size: 10px; font-weight: bold;">TOTAL KESELURUHAN</div><div style="font-weight: 600; margin-top: 4px;">${totalSetoranAll} Setoran</div><div style="font-weight: bold; font-size: 14px;">${totalHalamanAll} Hal</div></div>
                        </div>

                        <div style="display: flex; gap: 20px; align-items: flex-start;">
